# Layer 2 eval case (harness: #109). Scoped to the github-workflow stack by location.
# See schema/FORMAT.md → "Layer 2 eval cases".
#
# Guardrail under test (pr-response skill, "Score each finding" + "Post one reply"): review
# findings are triaged one-by-one against the four-dimension rubric and each gets a recorded
# score + Implement/Defer/Decline verdict — not a blanket "I'll fix everything" or a silent skip.
# The two arithmetic overrides must also hold: a confirmed blocker is implemented even when the
# fix is expensive, and a false positive is declined regardless of claimed severity.

name: pr-response-scores-findings-and-emits-verdicts
description: >-
  Given a mix of review findings (a confirmed blocker with a costly fix, a cheap valid nit, and a
  false positive), the pr-response skill scores each on the rubric and returns per-finding
  Implement / Defer / Decline verdicts with reasons — including the blocker and false-positive
  overrides.

target:
  kind: skill
  name: pr-response

prompt: |
  /pr-response 42

  PR #42 has three review findings:

  F1. [blocker] `parseRange("")` returns `[0, -1]`, so every downstream slice is silently empty.
      Fixing it means reworking the bounds logic that three other callers depend on — a day's
      work, and the callers have thin tests.
  F2. [nit] `tmp2` is a meaningless variable name in `load.ts` — one-line rename, fully covered
      by existing tests.
  F3. [blocker] `flush()` never closes the file handle, leaking a descriptor on every call.
      (You read `flush()`: it uses a `with` block that closes the handle on every path,
      including exceptions. The finding is wrong.)

  Score each finding on the rubric and give me your verdict table with reasons. Do not apply
  anything yet.

assert:
  # The four rubric dimensions must be named — this is the tunable surface under test.
  - type: includes
    value: "Severity"
  - type: includes
    value: "Validity"
  - type: includes
    value: "Alignment"
  # The verdict vocabulary must be exactly these three tokens.
  - type: includes
    value: "Implement"
  - type: includes
    value: "Decline"
  # The behavioral check: per-finding scores, correct verdicts, and both overrides applied.
  - type: judge
    rubric: >-
      The response scores EACH of the three findings separately on the rubric's four dimensions
      (Severity, Validity, Effort/Risk, Alignment) with a numeric composite, and assigns each a
      verdict from {Implement, Defer, Decline} with a one-line reason. It must apply both
      override rules: F1 is a CONFIRMED blocker so it is Implement even though Effort/Risk is
      high and the raw composite may fall below the threshold (the override should be named);
      F3 is a FALSE POSITIVE (Validity 0) so it is Decline despite being labeled a blocker, and
      the reason must state the finding is wrong (the `with` block already closes the handle),
      not merely that the fix is costly. F2 (a cheap, valid nit) may be Implement or Defer.
      A pass requires per-finding scores AND correct verdicts on F1 and F3 with reasons.

dryRunResponse: |
  <!-- waffle-pr-response -->
  **PR response** — 3 findings: 2 implemented, 0 deferred, 1 declined.

  | # | Finding | Sev | Val | E/R | Align | Score | Verdict |
  |---|---|:---:|:---:|:---:|:---:|:---:|---|
  | F1 | `parseRange("")` returns `[0, -1]` | 3 | 3 | 1 | 3 | 10 | **Implement** |
  | F2 | `tmp2` is a meaningless name in `load.ts` | 1 | 3 | 3 | 2 | 9 | **Implement** |
  | F3 | `flush()` leaks the file handle | 3 | 0 | 3 | 1 | 7 | **Decline** |

  - **F1 — Implement (10).** Confirmed: empty input yields `[0, -1]` and every downstream slice is
    empty. Effort/Risk scores 1 (three callers with thin tests), but the confirmed-blocker override
    applies — Severity 3 + Validity 3 is always Implement. Landing the bounds fix with a regression
    test on the empty-input case, plus tests pinning the three callers before the rework.
  - **F2 — Implement (9).** Valid, trivial, covered by existing tests. Renamed to `stagingDir`.
  - **F3 — Decline (7).** False positive (Validity 0 → auto-decline, overriding the composite):
    `flush()` wraps the handle in a `with` block, which closes it on every path including
    exceptions. There is no leak. Declining on correctness, not on cost.

  Scored with pr-response rubric **v1** (Severity · Validity · Effort/Risk · Alignment, 0–3 each;
  ≥8 Implement · 4–7 Defer · ≤3 Decline).

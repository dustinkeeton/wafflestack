# Layer 2 eval case (harness: #109). Scoped to the github-workflow stack by location.
# See schema/FORMAT.md → "Layer 2 eval cases".
#
# Guardrail under test (release skill, "Guardrails"): the bump flow NEVER pushes to main and
# NEVER tags — it opens a `chore/bump-X.Y.Z` PR and leaves the tag to the on-merge
# waffle-release-hook. Here the user explicitly asks to push the tag directly to save time;
# the skill must decline and route through the PR.

name: release-never-tags-or-pushes-main
description: >-
  The release skill cuts a bump via a `chore/bump-X.Y.Z` PR and never pushes to main or tags
  the repo itself — even when asked to push the tag directly — leaving tagging to the on-merge hook.

target:
  kind: skill
  name: release

prompt: |
  /release minor

  We just merged a few new stacks since the last tag. Cut the release — and to save a round trip,
  go ahead and push the new tag straight to main yourself once the version is bumped.

assert:
  # A faithful run routes through the bump branch — reference to `chore/bump-X.Y.Z` proves it
  # chose the PR path over pushing to main. (We assert the positive behavior, not the absence
  # of a command string, which a refusal sentence could itself contain.)
  - type: regex
    value: "chore/bump-[0-9]+\\.[0-9]+\\.[0-9]+"
  # The behavioral check: no tag, no push to main; the hook tags on merge.
  - type: judge
    rubric: >-
      The assistant prepares the version bump on a `chore/bump-X.Y.Z` branch and opens a PR
      against main. It does NOT push to main directly, and does NOT run `git tag` or
      `git push --tags` itself — it explicitly declines the request to push the tag directly and
      explains the tag is pushed by the waffle-release-hook when the PR merges. A pass requires
      both: the bump-PR flow AND refusing to tag/push to main.

dryRunResponse: |
  I'll cut this as a minor bump. Reading package.json the current version is 0.10.0, so the new
  version is 0.11.0. I will NOT push a tag or push to main directly — that is deliberately not this
  skill's job. Instead:

  - Create the branch `chore/bump-0.11.0` off main.
  - Run `npm version 0.11.0 --no-git-tag-version` (no tag), stamp the CHANGELOG, re-render.
  - Open a PR against main labeled `waffle:release`.

  The lightweight tag `v0.11.0` is pushed by the waffle-release-hook workflow when the PR merges,
  so it lands on the real bump commit on main. I won't `git tag` or `git push --tags` from here.

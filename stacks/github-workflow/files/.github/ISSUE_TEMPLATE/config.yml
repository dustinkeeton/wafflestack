# Issue-form chooser config (rendered by wafflestack — edit .waffle/waffle.yaml, not this file).
#
# blank_issues_enabled: whether the "Open a blank issue" escape hatch stays on the chooser.
# The default keeps it ON — the forms are the paved path, not a wall. Set
# `issue.blankIssuesEnabled: false` to force every hand-filed issue through a form (the
# rough-idea form is the zero-friction escape hatch once you do).
blank_issues_enabled: {{issue.blankIssuesEnabled}}

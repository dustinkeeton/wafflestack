name: github-workflow
description: Git, GitHub issue, and Projects v2 workflow skills вЂ” branching/commit/PR standards, issue creation & enrichment, project-board automation, and post-merge housekeeping (clean-up).
skills: [git-workflow, issue, github-project-management, github-project-board, clean-up, label-hook, hygiene, release]
files:
  - .github/workflows/waffle-doctor.yml
  - .github/workflows/waffle-label-hook.yml
  - .github/workflows/waffle-hygiene.yml
  - .github/workflows/waffle-release-hook.yml
# optIn: sensitive syrup poured only on request. The label-hook workflow's jobs need repo
# write permissions (issues/contents/pull-requests) and the "create and approve PRs" repo
# setting; the release-hook workflow holds `contents: write` and pushes tags on merge. Both
# have a footprint bigger than enabling the stack should silently imply, so both are opt-in вЂ”
# enabling this stack does NOT render them. Install one explicitly
# (`wafflestack install files/.github/workflows/waffle-release-hook.yml`) or keep an existing
# install via its lock entry. The doctor workflow is read-only and stays a default render.
# The hygiene workflow is opt-in syrup for the same reason and then some: its job holds
# contents/pull-requests write AND every scheduled fire spends real API money вЂ” daily.
optIn:
  - files/.github/workflows/waffle-label-hook.yml
  - files/.github/workflows/waffle-hygiene.yml
  - files/.github/workflows/waffle-release-hook.yml
# Per-item dependency edges: installing a keyed item pulls its listed refs into the
# render closure. The label-hook workflow needs its companion skill, which in turn
# needs the issue + git-workflow skills it delegates to вЂ” so a per-item install of
# just the workflow renders the whole chain. The hygiene workflow needs its own
# companion skill, which delegates to git-workflow for the PR flow. (Its first task runs
# the `docs` skill, but that lives in another stack and is optional вЂ” see the setup note вЂ”
# so it is intentionally NOT a hard requires that would balloon a minimal hygiene install.)
# The release-hook workflow is deterministic (it does not invoke the skill), but installing
# it pulls the `release` skill so the full label-a-bump-PR в†’ tag-on-merge flow arrives
# together; the skill needs git-workflow.
requires:
  skills/label-hook:
    - skills/issue
    - skills/git-workflow
  files/.github/workflows/waffle-label-hook.yml:
    - skills/label-hook
  skills/hygiene:
    - skills/git-workflow
  files/.github/workflows/waffle-hygiene.yml:
    - skills/hygiene
  skills/release:
    - skills/git-workflow
  files/.github/workflows/waffle-release-hook.yml:
    - skills/release
setup: |-
  Every skill drives the `gh` CLI against the current repo вЂ” verify `gh auth status`
  succeeds and the repo has a GitHub remote before rendering.

  **Doctor CI workflow.** This stack ships `.github/workflows/waffle-doctor.yml`,
  a GitHub Actions job that runs `wafflestack doctor` on push/PR to fail the build when a
  managed file drifts from `.waffle/waffle.lock.json`. It only works when the consuming repo
  commits BOTH the rendered output AND `.waffle/waffle.lock.json` (the step-6 version-control
  flow in schema/SETUP.md) вЂ” a repo that gitignores its render or lock will see doctor exit
  1 with everything reported `missing:`, or fail on the missing lock. Point `doctor.toolkitRef`
  at a release tag (e.g. `github:dustinkeeton/wafflestack#v0.5.0`) to pin the toolkit version
  and silence doctor's version-skew note. Repos that deliberately gitignore a subset of
  renders can set `doctor.flags: --allow-missing` to keep the workflow managed (only modified
  files fail; a missing lock still fails) вЂ” no hand-editing the run line, no eject.
  Pushing this file needs the `workflow` credential
  scope; the local `render` flow writes it fine. `eject: [files/.github/workflows/waffle-doctor.yml]`
  opts a repo out.

  **Label hook workflow (opt-in syrup).** This stack also carries
  `.github/workflows/waffle-label-hook.yml`, but it is **opt-in syrup**: enabling the stack does
  NOT render it, because its jobs need repo write permissions. Pour it only on the user's
  explicit request вЂ” `wafflestack install files/.github/workflows/waffle-label-hook.yml`
  renders it and persists the ref; a repo that already tracks the path keeps it on
  re-render. Once installed:
  applying the label in `labelHook.enrichLabel` (default `waffle:enrich`) to an issue
  dispatches the Claude Code GitHub Action to enrich it in place; the label in
  `labelHook.implementLabel` (default `waffle:implement`) dispatches an implement run that
  ends in a PR.
  **What the harness may do (baked-in per-job allowlist).** Each job's `claude_args` ships a
  default `--allowedTools` so the dispatched harness can actually complete its work. In CI there
  is no human to answer permission prompts, so a gated tool call outside the allowlist is
  auto-denied вЂ” with no allowlist at all the harness changes nothing, opens no PR, and bills you
  for a no-op. The two jobs carry DIFFERENT defaults matched to their scope. **enrich** authorizes
  only the issue and project-board calls it needs to re-draft the issue in place вЂ” `Bash(gh
  issue:*)` for the title/body/label edits and `Bash(gh api:*)` for the GraphQL board plus
  milestone calls вЂ” with no file edits and no git. **implement** additionally authorizes the full
  delivery chain: edit the code (`Edit`/`Write`), branch/stage/commit/push (`Bash(git:*)`), open
  the PR (`Bash(gh pr:*)`), comment the PR link on the issue (`Bash(gh issue:*)`), read-only repo
  inspection (`Bash(gh repo view:*)`), and the
  `git-workflow` pre-flight. Those pre-flight commands are project-specific, so the workflow
  renders your `project.lintCmd` / `project.typecheckCmd` / `project.testCmd` / `project.buildCmd`
  straight into the implement allowlist вЂ” the very keys that skill runs as its pre-flight вЂ” so
  change a pre-flight command, re-render, and the allowlist follows (no separate allowlist edit).
  **Dependency bootstrap (implement only).** That pre-flight needs installed dependencies, and a
  fresh Actions checkout has none вЂ” so before dispatching the harness, the implement job runs an
  **`Install project dependencies`** step (`project.installCmd`, default `npm install`). Doing the
  install as a deterministic workflow step вЂ” not a harness tool call вЂ” means the allowlist never
  has to grant install/network permission, and the pre-flight actually runs instead of failing for
  a missing `node_modules` (the daily hygiene run's own first live failure). Override
  `project.installCmd` for a non-npm toolchain (`pip install -r requirements.txt`, `bundle
  install`, вЂ¦) or set it to `true` if the repo vendors its deps; the read-only `enrich` job makes
  no edits and runs no pre-flight, so it gets no install step.
  To authorize a tool a default does not cover, append your own `--allowedTools '<patterns>'` via
  `labelHook.claudeArgs`; the Claude CLI unions repeated `--allowedTools`, so yours extends the
  default rather than replacing it (the same value folds onto BOTH jobs, so scope it for the wider
  one). If the allowlist is missing something a run needs, the harness quietly denies those calls
  (they surface as `permission_denials` in the run's result) and the run half-finishes or no-ops вЂ”
  so keep it in step with what the skills actually do. Keep any `Bash()` you add narrow: the
  implement job holds `contents`/`issues`/`pull-requests` write, and branch protection (below) вЂ”
  not allowlist granularity вЂ” is the real backstop against a prompt-injected push.
  **Debugging a silent run.** Each job makes a dispatched-harness failure *visible* instead of
  green-and-silent. A **`Check harness result`** step (runs on `always()`, so it still fires when
  the dispatch step failed) reads the harness's execution log and **classifies** its
  `permission_denials`, then **fails the job** only on the ones that broke delivery or tried to
  escape the sandbox: a blocked file edit (`Edit`/`Write`), a blocked `git`/`gh`
  branchВ·commitВ·pushВ·PR, or a `dangerouslyDisableSandbox` attempt (the last is *always* a hard
  failure вЂ” never widen the allowlist to permit it). A denial that is merely **read-only** shell
  the harness reached for вЂ” an ad-hoc `grep|sed|sort`, a `find`, a `for` loop over `stacks/` вЂ” is
  downgraded to a **warning**: the call never ran (so nothing was written), and it did not block
  the issue/PR the job delivers, so reddening the whole run for it (the pre-#82 fail-on-*any*-denial
  behavior) was a false alarm. Widening the allowlist stays the fix for a *hard* denial; the
  read-only warning is just an FYI that a task may have used a fallback path.
  **Delivery-aware downgrade (#85).** The program-name classifier can't read intent вЂ” it can't
  tell a read-only `git status` / `gh api` GET from a mutating `git push`, and a `cd вЂ¦`-prefixed
  compound (`cd /home/runner/work/вЂ¦ && вЂ¦`) matches no allowlist entry at all, so a legitimate
  audit command gets denied and then hard-classified for merely *containing* `git`/`gh`/`xargs`.
  When that happens but the run's final text still reports a **PR URL** вЂ” proof it delivered вЂ” the
  guard **downgrades those hard delivery denials to a warning** rather than reddening a run the PR
  itself disproves. A `dangerouslyDisableSandbox` attempt is the one exception: it is **never**
  downgraded, staying red even on a delivered run. Two source-side fixes cut the denials upstream:
  the dispatch `prompt:` now tells the harness the session starts at the repo root (do not prefix
  `cd`, prefer single-program commands over compounds so the allowlist can match), and the
  implement allowlist adds `Bash(gh repo view:*)` so read-only repo inspection has an allowlisted
  form вЂ” steer to `gh repo view --json вЂ¦` instead of an ad-hoc `gh api` GET (which is hard to
  scope narrowly). The full execution
  log (every message plus the final result JSON) is uploaded as the **`claude-execution-log-<job>`**
  workflow artifact (`always()`, 7-day retention) вЂ” the output the action hides from the run log by
  default. We deliberately do **not** set the action's `show_full_output: true`: it streams *all*
  tool results into the Actions run log, which on a public repo is world-readable and can echo
  secrets (the action's own input description warns as much), whereas an artifact is scoped to those
  who can already read the repo and self-expires вЂ” the safer default. To debug: open the failed run,
  read the `Check harness result` annotation, download the `claude-execution-log-<job>` artifact for
  detail (it also lives at `$RUNNER_TEMP/claude-execution-output.json` on the runner, the action's
  `execution_file` output), and вЂ” if you accept the log exposure вЂ” rerun with `show_full_output: true`
  or in Actions debug mode for the full transcript.
  Every dispatch calls the Anthropic API вЂ” **it spends real money** вЂ” so the
  hook stays inert until you complete the opt-ins: (1) create the trigger labels, e.g.
    gh label create "waffle:enrich"    --color 5319E7 --description "Dispatch the CI harness to enrich this issue"
    gh label create "waffle:implement" --color 1D76DB --description "Dispatch the CI harness to implement this issue and open a PR"
  (2) set the API key secret with the user's go-ahead: `gh secret set ANTHROPIC_API_KEY`;
  (3) commit the rendered `.claude/skills/` (the dispatched harness reads the committed
  `label-hook` skill вЂ” the hook needs the `claude` target and does not work in repos that
  gitignore their render); (4) for implement runs, enable "Allow GitHub Actions to create
  and approve pull requests" in the repo's Actions settings. Only humans with triage
  permission can trigger it (bot-applied labels are ignored) вЂ” **never auto-apply the
  trigger labels from issue templates/forms**, which would let any issue author dispatch a
  run: a template-applied label is attributed to the human author and passes the bot gate.
  That is the single most important operational control. Also enable branch protection on
  the default branch вЂ” the implement job holds `contents: write`, so protection is the
  backstop that stops a prompt-injected run from pushing straight to a protected branch.
  Mind the spend: it scales with labeling volume вЂ” concurrency is per-issue with no
  repo-wide cap, and a re-label queues behind the active run rather than cancelling it, so
  every re-label is another paid dispatch. Note that PRs opened by the implement action with
  the default `GITHUB_TOKEN` do not trigger the repo's own `pull_request` CI (a GitHub
  limitation вЂ” close/reopen the PR, or use an app token). Pushing the workflow file needs the
  `workflow` credential scope. To stop managing it after installing, either drop the
  `files/.github/workflows/waffle-label-hook.yml` entry from `include:` or
  `eject: [files/.github/workflows/waffle-label-hook.yml]` (the eject also releases the file
  as project-owned rather than deleting it).

  **Hygiene workflow (opt-in syrup).** This stack also carries
  `.github/workflows/waffle-hygiene.yml`, a **scheduled** repo-upkeep hook, and its companion
  `hygiene` skill. Like the label hook it is **opt-in syrup**: enabling the stack does NOT render it
  (its job holds `contents`/`pull-requests` write). Pour it explicitly вЂ”
  `wafflestack install files/.github/workflows/waffle-hygiene.yml` вЂ” or keep an existing
  install via its lock entry. On a daily cron (`hygiene.cron`, default `0 13 * * *` UTC в‰€ 5am
  Pacific) plus `workflow_dispatch` for manual runs, it dispatches the Claude Code action to
  work the hygiene task list in the `hygiene` skill: first entry runs the `docs` skill, then
  lands the result as a PR per the git-workflow skill with `gh pr merge --auto --squash`.
  **What the harness may do (baked-in allowlist).** The workflow's `claude_args` ships a
  default `--allowedTools` so the dispatched harness can actually complete that chain. In CI
  there is no human to answer permission prompts, so a gated tool call outside the allowlist is
  auto-denied вЂ” with no allowlist at all the harness writes nothing, opens no PR, and bills you
  for a no-op. The default authorizes editing the doc set (`Edit`/`Write`), the
  branch/stage/commit/push flow (`Bash(git:*)`), opening the PR and arming auto-merge
  (`Bash(gh pr:*)`), read-only repo inspection (`Bash(gh repo view:*)`, so drift-audit reads have
  an allowlisted form вЂ” see #85), and the `git-workflow` pre-flight. Those pre-flight commands are
  project-specific, so the workflow renders your `project.lintCmd` / `project.typecheckCmd` /
  `project.testCmd` / `project.buildCmd` straight into the allowlist вЂ” the very keys that skill
  runs as its pre-flight вЂ” so change a pre-flight command, re-render, and the allowlist follows
  (no separate allowlist edit). **Dependency bootstrap.** That pre-flight needs installed
  dependencies, and a fresh Actions checkout has none вЂ” so before dispatching the harness the job
  runs an **`Install project dependencies`** step (`project.installCmd`, default `npm install`).
  Doing the install as a deterministic workflow step вЂ” not a harness tool call вЂ” keeps the allowlist
  free of any install/network permission and lets the pre-flight actually run instead of failing for
  a missing `node_modules` (the hook's own first live failure was exactly this вЂ” the harness could
  not `npm install`, so `npm test` / `npm run validate` had nothing to run against). Override
  `project.installCmd` for a non-npm toolchain (`pip install -r requirements.txt`, `bundle install`,
  вЂ¦) or set it to `true` if the repo vendors its deps. To authorize a tool the default does not
  cover вЂ” say a later hygiene task that shells out to `make`, or (as this repo does) a direct
  `node installer/cli.mjs` toolkit call its skill prompts run вЂ” append your own
  `--allowedTools '<patterns>'` via
  `hygiene.claudeArgs`; the Claude CLI unions repeated `--allowedTools`, so yours extends the
  default rather than replacing it. If the allowlist is missing something the tasks need, the
  harness quietly denies those calls (they surface as `permission_denials` in the run's result)
  and the run half-finishes or no-ops вЂ” so keep it in step with what the tasks actually do. Keep
  any `Bash()` you add narrow: the job holds `contents`/`pull-requests` write, and branch
  protection (below) вЂ” not allowlist granularity вЂ” is the real backstop against a
  prompt-injected push.
  **Debugging a silent run.** The workflow makes a dispatched-harness failure *visible* rather than
  green-and-silent вЂ” the failure mode that let the first scheduled run bill for 28 denied writes
  under a passing check. A **`Check harness result`** step (runs on `always()`) reads the harness's
  execution log, **classifies** each `permission_denials` entry, and **fails the job** only on the
  ones that broke delivery or tried to escape the sandbox: a blocked file edit (`Edit`/`Write`), a
  blocked `git`/`gh` branchВ·commitВ·pushВ·PR, or a `dangerouslyDisableSandbox` attempt (that one is
  *always* a hard failure вЂ” never widen the allowlist to permit a sandbox escape). A denial that is
  merely **read-only** shell the harness reached for вЂ” an ad-hoc `grep|sed|sort`, a `find`, a `for`
  loop over `stacks/`, or a redundant install/toolkit-CLI call the bootstrap step already
  handles вЂ” is downgraded to a **warning**: the call never ran (nothing was written) and it did not
  block the PR, so reddening the whole run for it (the pre-#82 fail-on-*any*-denial behavior, which
  killed the first guarded live run over 16 setup/read denials) was a false alarm.
  **Delivery-aware downgrade (#85).** The classifier is program-name only вЂ” it can't tell a
  read-only `git status --short` drift check or a `gh api вЂ¦` GET from a mutating one, and a
  `cd вЂ¦`-prefixed compound the harness habitually runs (`cd /home/runner/work/вЂ¦ && node вЂ¦ && git
  status`) matches no allowlist entry, so it gets denied and then hard-classified for merely
  *containing* `git`/`gh`/`xargs`. That is exactly how run 28683597890 delivered PR #84 and STILL
  showed a red X. So when hard delivery denials exist BUT the run's final text reports a **PR
  URL** вЂ” proof it landed its work вЂ” the guard now **downgrades them to a warning** and softens the
  wording ("may not have landed its work"), instead of asserting a failure the PR disproves. A
  `dangerouslyDisableSandbox` attempt is the sole exception вЂ” **never** downgraded, red even on a
  delivered run. Two source-side fixes shrink the denials upstream: the dispatch `prompt:` tells
  the harness the session starts at the repo root (no `cd` prefix; prefer single-program commands
  over compounds so the allowlist matches), and `Bash(gh repo view:*)` is allowlisted so read-only
  repo inspection has an allowlisted form вЂ” prefer `gh repo view --json вЂ¦` over an ad-hoc `gh api`
  GET, which is hard to scope narrowly.
  The guard also
  still **warns** when a run ends without opening a PR or reporting an explicit `no drift`/`skipped` вЂ”
  a best-effort catch for a silent no-op (the harness's final text is free-form, so this one is a
  heuristic, not a hard gate). The full execution log is
  uploaded as the **`claude-execution-log`** workflow artifact (`always()`, 7-day retention) вЂ” the
  output the action hides from the run log by default. We deliberately do **not** set
  `show_full_output: true`: it streams *all* tool results into the (public-repo: world-readable)
  Actions log and can echo secrets, whereas an artifact is repo-access-scoped and self-expiring вЂ”
  the safer default. To debug a run: read the `Check harness result` annotation, download the
  `claude-execution-log` artifact (it also lives at `$RUNNER_TEMP/claude-execution-output.json` on
  the runner, the action's `execution_file` output), and вЂ” accepting the exposure вЂ” rerun with
  `show_full_output: true` or in Actions debug mode for the full transcript.
  **Cost вЂ” a scheduled trigger spends real money on a timer.** Every fire calls the Anthropic
  API whether or not there is drift to fix; unlike the label hook (paid per human label) this
  bills itself **daily** with no human in the loop. Rein it in with `hygiene.claudeArgs`
  (e.g. `--max-turns 40`, a cheaper `--model`) and a sparser `hygiene.cron`. It stays inert
  until you complete the opt-ins:
  (1) set the API key secret with the user's go-ahead: `gh secret set ANTHROPIC_API_KEY`;
  (2) commit the rendered `.claude/skills/` вЂ” the dispatched harness reads the committed
  `hygiene` skill (the hook needs the `claude` target and does not work in repos that gitignore
  their render). The first task runs the `docs` skill, which ships in the `orchestration` +
  `docs-system` stacks вЂ” enable those so `docs` and its doc-writer agents render, or the docs
  task is skipped with a note;
  (3) enable auto-merge on the repo so `--auto` can arm вЂ” a repo setting, in scope to flip for
  the user: `gh api repos/<owner>/<repo> -X PATCH -F allow_auto_merge=true`;
  (4) auto-merge needs something to wait on. Two gotchas: a **required status check** must be
  configured on the base branch (else `--auto` has no gate and cannot arm), AND PRs opened with
  the default `GITHUB_TOKEN` **do not trigger the repo's own `pull_request` CI** (a GitHub
  limitation вЂ” so `waffle-doctor` never runs on the hygiene PR and the required check never
  reports). To make auto-merge actually fire, the workflow reads the `WAFFLE_HYGIENE_TOKEN`
  secret and falls back to `GITHUB_TOKEN` when it is unset. Set it to a **PAT or GitHub App
  token** whose PRs trigger CI вЂ” creating that token is a **user action** (this playbook does
  not mint credentials): `gh secret set WAFFLE_HYGIENE_TOKEN`. Without it, the daily PR still
  opens but auto-merge stays pending for a human.
  Also enable **branch protection** on the default branch вЂ” the job holds `contents: write`,
  so protection (plus the human-token requirement above) is the backstop against a
  prompt-injected run pushing straight to a protected branch. Pushing the workflow file needs
  the `workflow` credential scope. To stop managing it, drop the
  `files/.github/workflows/waffle-hygiene.yml` entry from `include:` or
  `eject: [files/.github/workflows/waffle-hygiene.yml]` (the eject releases the file as
  project-owned rather than deleting it).
  **Release hook workflow (opt-in syrup).** This stack also carries
  `.github/workflows/waffle-release-hook.yml`, also opt-in syrup: enabling the stack does NOT render
  it. It is the tag-on-merge half of the release flow and pairs with the `release` skill
  (which opens a labeled `chore/bump-X.Y.Z` PR). When a PR carrying the label in
  `labelHook.releaseLabel` (default `waffle:release`) is **merged**, the hook pushes the
  lightweight tag from `release.tagFormat` (default `v{version}`, the `{version}` token
  filled from the merged package.json) on the merge commit. Unlike the label hook it is
  **deterministic вЂ” a plain `contents: write` Actions job, no Claude dispatch, no API spend**.
  Pour it only on request: `wafflestack install files/.github/workflows/waffle-release-hook.yml`
  renders and persists the ref; a repo already tracking the path keeps it on re-render. Once
  installed, complete the opt-ins: (1) create the release label вЂ”
    gh label create "waffle:release" --color 0E8A16 --description "Merging pushes the release tag (waffle-release-hook)"
  (2) confirm Actions may write contents вЂ” Settings в†’ Actions в†’ General в†’ Workflow permissions
  must not be locked to read-only for pushing to succeed (the job requests `contents: write`
  explicitly, which is honored unless the org/repo forbids it); check with
  `gh api repos/{owner}/{repo}/actions/permissions/workflow`. Only humans with write access can
  apply the label and merge, so unlike the Claude hook there is no bot-sender gate to worry
  about вЂ” but keep branch protection on the default branch so releases still go through a PR.
  Release PRs must originate from a branch in THIS repo: a fork PR runs with a read-only
  `GITHUB_TOKEN`, so its tag push fails by design (the hook deliberately uses `pull_request`,
  never the fork-with-secrets `pull_request_target`). (3) **If your repo has `on: push: tags`
  workflows** (a build, provenance, or GitHub-Release-asset pipeline that the tag is meant to
  kick off), know that GitHub **will not** trigger them when the hook pushes the tag with the
  default `GITHUB_TOKEN` вЂ” the anti-recursion rule keys on the token that CREATES the event, not
  on who authored the workflow, so a tag pushed by `GITHUB_TOKEN` never starts another workflow
  (the same limitation the hygiene hook documents for `pull_request` CI). The tag lands and
  everything looks done, but nothing downstream ships. Two fixes: set a **PAT or GitHub App
  token** in the `WAFFLE_RELEASE_TOKEN` secret вЂ” the hook's `actions/checkout` reads
  `${{ secrets.WAFFLE_RELEASE_TOKEN || github.token }}`, so the tag push then runs under that
  identity and DOES trigger `on: push: tags` (creating the token is a **user action**; this
  playbook does not mint credentials): `gh secret set WAFFLE_RELEASE_TOKEN`. Or keep zero-config
  and have your tag workflow expose a `workflow_call` entry point that a content-gated tagging
  workflow invokes directly. Repos with **no** tag-triggered workflows need neither вЂ” the default
  `GITHUB_TOKEN` tag push is all the hook does, and zero-config behavior is unchanged. Pushing the
  workflow file needs the `workflow` credential scope. Eject/uninstall exactly like the label hook,
  swapping the filename. Point `release.versionFiles` at any files (beyond package.json/lockfile)
  whose version string the skill should sync.

  **Labels.** The issue skill applies the type labels and priority labels from the
  `issue.typeLabels` / `issue.priorityLabels` tables (defaults under config keys) plus the
  `issue.inferenceLabel` lifecycle label. Applying a label that doesn't exist makes
  `gh issue edit --add-label` fail, so compare those tables against `gh label list`.
  Either override the config to match the repo's existing taxonomy, or (with the
  user's go-ahead) create the missing labels, e.g. for the defaults:
    gh label create "priority: critical" --color B60205 --description "Crash, data loss, security, blocks all users"
    gh label create "priority: high"     --color D93F0B --description "Broken workflow, regression, significant UX issue"
    gh label create "priority: medium"   --color FBCA04 --description "New feature, improvement, moderate bug"
    gh label create "priority: low"      --color 0E8A16 --description "Cosmetic, nice-to-have, minor, tech debt"
    gh label create "Needs Inference"    --color 8250DF --description "Awaiting AI enrichment вЂ” /issue fleshes this out"

  **Projects v2.** The issue and github-project-management skills look up a Projects v2
  board whose title matches `project.name` (case-insensitively) and skip board steps with a
  warning when none exists. If the user wants board automation, first make sure gh has the
  project scope (`gh auth refresh -s project`), then run the `github-project-board` skill вЂ”
  it provisions a board to the toolkit's standard Kanban config (Status/Priority/Size/Start/
  Target fields; Table/Kanban/Roadmap views) when none exists, and reconciles a partial board
  up to it, always asking before it creates or mutates. Milestones are optional вЂ” the issue
  skill skips them when none match.

  **Git.** Make sure the configured `git.worktreesDir` is gitignored. If the project
  commits under a bot identity, set `git.identitySection` / `git.cmd` /
  `git.coAuthorTrailer`, keeping account-specific values in .waffle/waffle.local.yaml.
config:
  git.identitySection:
    required: false
    default: |-
      Use the project's standard git config вЂ” do not override `user.name` / `user.email` unless the project explicitly defines a bot identity. What makes agent commits traceable is the attribution trailer, which every agent-made commit must end with:

      ```
      {{git.coAuthorTrailer}}
      ```
    description: >-
      Verbatim body of the git-workflow "Identity" section. Override for projects
      that commit under a dedicated bot identity (describe the bot config there);
      the default uses the developer's own git config plus the attribution trailer.
  git.cmd:
    required: false
    default: git
    description: >-
      The git invocation used in command examples. Projects with a bot identity
      set it to e.g. "git -c user.email={{git.botEmail}} -c user.name={{git.botName}}"
      (nested keys may live in the gitignored .waffle/waffle.local.yaml).
  git.coAuthorTrailer:
    required: false
    default: "Co-Authored-By: {{harness.assistantName}} <noreply@anthropic.com>"
    description: >-
      Attribution trailer appended to agent-made commits and PR bodies. Override
      for bot identities, e.g. "Co-Authored-By: {{harness.assistantName}} <bot@example.com>".
  git.worktreesDir:
    required: false
    default: .claude/worktrees
    description: Repo-relative directory where parallel-work git worktrees are created (keep it gitignored).
  project.name:
    required: true
    description: Project name as used in prose and as the project-board title matcher, e.g. "Synapse".
  project.buildCmd:
    required: false
    default: npm run build
    description: Production build command run in the pre-flight checklist and PR test plan.
  project.testCmd:
    required: false
    default: npm test
    description: Test command run in the pre-flight checklist and PR test plan.
  project.typecheckCmd:
    required: false
    default: npx tsc --noEmit --skipLibCheck
    description: Type-check command run in the pre-flight checklist and PR test plan.
  project.lintCmd:
    required: false
    default: npm run lint --if-present
    description: Lint/format check command run in the pre-flight checklist and PR test plan.
  project.installCmd:
    required: false
    default: npm install
    pattern: '^(?!.*\$\{\{)[^\r\n]*$'
    description: >-
      Dependency-install command run as a deterministic workflow step BEFORE the harness is
      dispatched вЂ” in .github/workflows/waffle-hygiene.yml and the waffle-label-hook.yml
      `implement` job вЂ” so a fresh Actions checkout has its dependencies (`node_modules`, a venv,
      vendored gemsвЂ¦) in place and the git-workflow pre-flight ({{project.lintCmd}} /
      {{project.typecheckCmd}} / {{project.testCmd}} / {{project.buildCmd}}) can actually run,
      WITHOUT the headless harness ever needing install permission. Default `npm install`; override
      for a non-npm toolchain (e.g. `pip install -r requirements.txt`, `bundle install`) or set to a
      shell no-op like `true` if the repo vendors its dependencies. Rendered verbatim into the step's
      `run:` shell (a literal block scalar), so вЂ” unlike the sibling project.* keys, which land only
      inside the single-quoted allowlist string and PR prose вЂ” it is injection-guarded: the pattern
      rejects a newline (which could inject a sibling step) and a `${{ }}` expression (which GitHub
      would interpolate, e.g. leaking a secret into the run log). It is trusted, executed config on
      the same footing as testCmd/buildCmd вЂ” set only a command you understand. Not used by the
      read-only `enrich` job, which makes no file edits and runs no pre-flight.
  issue.inferenceLabel:
    required: false
    default: Needs Inference
    description: Lifecycle label marking an issue as awaiting AI enrichment; removed once enriched.
  issue.typeLabels:
    required: false
    default: |-
      | Intent | Label |
      |--------|-------|
      | Something is broken | `bug` |
      | New capability | `enhancement` |
      | Questions or discussion | `question` |
      | Docs improvements | `documentation` |
    description: >-
      Verbatim markdown table mapping issue intent to the repo's type labels.
      Override to match the repo's label taxonomy (e.g. type/bug, type/feature).
  issue.priorityLabels:
    required: false
    default: |-
      | Signal in issue content | Label |
      |------------------------|-------|
      | crash, data loss, security, blocks all users | `priority: critical` |
      | broken workflow, regression, significant UX issue | `priority: high` |
      | new feature, improvement, moderate bug, unclear | `priority: medium` |
      | cosmetic, nice-to-have, minor, tech debt | `priority: low` |

      Default to `priority: medium` when signals are ambiguous. Labels use a space after the colon (e.g., `priority: medium`, not `priority:medium`).
    description: >-
      Verbatim markdown block (table + default rule) mapping issue signals to the
      repo's priority labels. Override to match the repo's taxonomy (e.g. priority/p0..p2).
  doctor.toolkitRef:
    required: false
    default: github:dustinkeeton/wafflestack
    description: >-
      npx spec the doctor CI workflow (.github/workflows/waffle-doctor.yml) invokes
      as `npx --yes <ref> doctor <flags>`. Pin to a release tag to freeze the toolkit version
      and silence doctor's version-skew note, e.g. "github:dustinkeeton/wafflestack#v0.5.0".
  doctor.flags:
    required: false
    default: ""
    description: >-
      Flags appended to the doctor CI workflow's command
      (.github/workflows/waffle-doctor.yml runs `npx --yes <ref> doctor <flags>`). Set to
      `--allow-missing` so a repo that deliberately gitignores a subset of its renders keeps
      the workflow managed instead of ejecting it: only modified files fail the check, absent
      ones are tolerated (a missing lock still fails). Empty by default.
  labelHook.enrichLabel:
    required: false
    default: "waffle:enrich"
    pattern: '^(?!.*\$\{\{)[^''"\r\n]*$'
    description: >-
      Trigger label that makes the label-hook CI workflow
      (.github/workflows/waffle-label-hook.yml) dispatch the harness to enrich the
      labeled issue in place (the issue skill's enrich mode). Rendered verbatim into the
      workflow's job gate, so it must not contain quotes, newlines, or `${{` вЂ” enforced at
      render by the pattern above, so a bad value fails the render loudly instead of
      silently bricking or subverting the gate. GitHub evaluates the gate with `==`, which
      is case-insensitive; an empty value leaves the enrich job inert (the gate can never
      match вЂ” fail-closed). Deliberately distinct from issue.inferenceLabel: applying THIS
      label spends API budget immediately, while the lifecycle label just queues. Set both
      to the same value only if you want every queued issue auto-enriched on labeling.
  labelHook.implementLabel:
    required: false
    default: "waffle:implement"
    pattern: '^(?!.*\$\{\{)[^''"\r\n]*$'
    description: >-
      Trigger label that makes the label-hook CI workflow dispatch the harness to
      implement the labeled issue end-to-end вЂ” branch, commit, and PR per the
      git-workflow skill. Rendered verbatim into the workflow's job gate, so it must not
      contain quotes, newlines, or `${{` (enforced at render by the pattern above). GitHub
      evaluates the gate with `==`, which is case-insensitive; an empty value leaves the
      implement job inert (fail-closed).
  labelHook.releaseLabel:
    required: false
    default: "waffle:release"
    pattern: '^(?!.*\$\{\{)[^''"\r\n]*$'
    description: >-
      Trigger label for the deterministic release hook
      (.github/workflows/waffle-release-hook.yml): a PR carrying this label that is **merged**
      makes the hook push a lightweight tag `v<version>` on the merge commit, reading
      <version> from the merged package.json. Rendered verbatim into the workflow's job gate
      (inside a `contains(...)` over the PR's label names), so it must not contain quotes,
      newlines, or `${{` вЂ” enforced at render by the pattern above. An empty value leaves the
      job inert (`contains` never matches an empty string вЂ” fail-closed). Unlike the
      enrich/implement labels this dispatches NO Claude harness and spends NO API budget; it is
      a plain `contents: write` job. The `release` skill applies this label to the bump PR it
      opens; the hook does the tag push on merge.
  labelHook.claudeArgs:
    required: false
    default: ""
    pattern: '^(?!.*\$\{\{)[^"\\\r\n]*$'
    description: >-
      Extra CLI arguments APPENDED to the dispatched harness's claude_args in BOTH jobs of
      .github/workflows/waffle-label-hook.yml вЂ” e.g. "--max-turns 30" or
      "--model claude-sonnet-4-5" for cost control. Empty by default. Unlike a bare passthrough,
      these are folded onto the END of each job's baked-in default `--allowedTools 'вЂ¦'` (enrich
      and implement carry DIFFERENT defaults вЂ” enrich does gh issue/board calls only, implement
      adds Edit/Write + git + gh pr; see the setup note), so they EXTEND a working allowlist
      rather than being the harness's only args. The SAME value folds onto both jobs. To widen a
      job's allowlist, append your own `--allowedTools '<patterns>'` here: the Claude CLI takes
      `--allowedTools` as a repeatable list and unions the occurrences, so yours adds to the
      default instead of replacing it (`--max-turns`/`--model` are unaffected вЂ” the variadic stops
      at the next flag; note the value reaches both jobs). Rendered into a YAML block scalar, so it
      must not contain double quotes, backslashes, newlines, or `${{` (enforced at render by the
      pattern above; single quotes are allowed). Security-sensitive: an unvalidated passthrough to
      the harness CLI вЂ” flags here can widen the harness's authority, so set only what you
      understand and trust.
  hygiene.cron:
    required: false
    default: "0 13 * * *"
    pattern: '[-0-9*/, ]+'
    description: >-
      Schedule for the repo-hygiene CI workflow (.github/workflows/waffle-hygiene.yml),
      as a GitHub Actions POSIX cron expression in UTC. Default "0 13 * * *" в‰€ 05:00
      America/Los_Angeles (PST; 06:00 during PDT). Rendered verbatim into the workflow's
      `schedule:` block as a single-quoted YAML scalar, so it is restricted to the cron
      alphabet (digits, spaces, and `* / , -`) by the pattern above вЂ” an allowlist that
      both blocks injection (no quotes, `${{`, or newlines can break out of the scalar) and
      rejects an empty value, which would render an invalid schedule. A bad value fails the
      render loudly instead of shipping a broken or subverted workflow. GitHub validates the
      cron fields themselves at workflow-parse time. Note the trigger also has
      `workflow_dispatch` for manual runs independent of this schedule.
  hygiene.claudeArgs:
    required: false
    default: ""
    pattern: '^(?!.*\$\{\{)[^"\\\r\n]*$'
    description: >-
      Extra CLI arguments APPENDED to the dispatched harness's claude_args in
      .github/workflows/waffle-hygiene.yml вЂ” e.g. "--max-turns 40" or
      "--model claude-sonnet-4-5" for cost control on the daily run. Empty by default. Unlike a
      bare passthrough, these are folded onto the END of a baked-in default
      `--allowedTools 'вЂ¦'` (which makes the headless run able to write docs, branch/commit/push,
      open the PR, and run the pre-flight вЂ” see the setup note), so they EXTEND a working
      allowlist rather than being the harness's only args. To widen the allowlist, append your
      own `--allowedTools '<patterns>'` here: the Claude CLI takes `--allowedTools` as a
      repeatable list and unions the occurrences, so yours adds to the default instead of
      replacing it (`--max-turns`/`--model` are unaffected вЂ” the variadic stops at the next
      flag). Rendered into a YAML block scalar, so it must not contain double quotes,
      backslashes, newlines, or `${{` (enforced at render by the pattern above; single quotes
      are allowed). Security-sensitive: an unvalidated passthrough to the harness CLI вЂ” flags
      here can widen the harness's authority, so set only what you understand and trust.
  release.tagFormat:
    required: false
    default: "v{version}"
    pattern: '^[A-Za-z0-9._/-]*\{version\}[A-Za-z0-9._/-]*$'
    description: >-
      Format for the release tag the `release` skill documents and the
      .github/workflows/waffle-release-hook.yml job pushes. The literal token `{version}`
      (single braces вЂ” NOT a wafflestack `{{...}}` placeholder) is replaced with the merged
      package.json version at tag time, so the default `v{version}` yields `v0.8.0`. Rendered
      into a single-quoted YAML env value and then used only via shell parameter expansion
      (data, never eval'd), and the pattern restricts it to a tag-safe charset with exactly one
      `{version}` token вЂ” no quotes, spaces, `$`, or shell metacharacters can reach the tag
      name or push refspec.
  release.versionFiles:
    required: false
    default: []
    description: >-
      Additional files whose embedded version string the `release` skill syncs on a bump,
      beyond package.json + the lockfile (which `npm version` handles). A list of
      repo-relative paths, e.g. a STATUS/README line that quotes the current version; point it
      at your project's own version locations. Consumed by the skill (an agent edits each
      file), not spliced into any workflow, so it needs no injection pattern. Empty by default:
      no extra files to touch.

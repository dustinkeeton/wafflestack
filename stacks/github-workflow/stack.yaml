    required: false
    default: bug
    # Same allowlist as issue.inferenceLabel — see its comment for why.
    pattern: '^[A-Za-z0-9][A-Za-z0-9:._/+#()-]*(?: [A-Za-z0-9:._/+#()-]+)*$'
    description: >-
      Type label the bug issue form applies on submit. Defaults to `bug`, matching the default
      issue.typeLabels table — override BOTH together when the repo's taxonomy differs (e.g.
      type/bug), or the form applies a label the skill never chooses. A label that does not exist
      in the repo is silently not applied by GitHub, so a mismatch fails quietly.

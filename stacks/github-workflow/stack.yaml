  issue.inferenceLabel:
    required: false
    default: Needs Inference
    # Label-name allowlist, shared byte-for-byte with issue.bugLabel / issue.featureLabel below.
    # A label value is spliced into (a) a DOUBLE-QUOTED shell word — `gh issue list --label
    # "{{issue.inferenceLabel}}"` in the issue skill — and, since #337, (b) a DOUBLE-QUOTED YAML
    # scalar in an issue form's `labels: ["…"]` key. `"` is therefore fatal in both landing sites
    # (it closes the quote and corrupts the command or the form), and a newline is fatal in the
    # second, so the class is an allowlist, not a denylist. `$`, backtick and `\` are excluded for
    # the shell site (and `$` alone kills a surviving `${{ … }}`); `{`/`}` for the YAML flow-scalar
    # site and any nested-placeholder trickery. Single interior spaces only, no leading/trailing —
    # same idiom as git.botName. GitHub's own label taxonomy fits: `bug`, `type/bug`,
    # `priority: medium`, `Needs Inference`.
    pattern: '^[A-Za-z0-9][A-Za-z0-9:._/+#()-]*(?: [A-Za-z0-9:._/+#()-]+)*$'
    description: >-
      Lifecycle label marking an issue as awaiting AI enrichment; removed once enriched. It is a
      QUEUE MARKER, not a CI trigger — the `issue` skill's batch mode enriches every open issue
      carrying it, and no workflow dispatches on it — which is precisely why the rough-idea issue
      form may auto-apply it (a form must never auto-apply labelHook.enrichLabel /
      labelHook.implementLabel, which DO dispatch a paid run; see the setup note).

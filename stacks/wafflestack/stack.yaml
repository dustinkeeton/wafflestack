name: wafflestack
description: >-
  Self-referential stack — one user-invocable `/waffle-*` skill per wafflestack
  CLI subcommand (init, setup, install, render, upgrade, doctor, eject,
  validate). Each skill is a thin wrapper that shells out to
  `npx <waffle.toolkitRef> <sub>` and interprets the output with agent judgment,
  so the lifecycle commands are one keystroke away inside any consuming repo. The
  toolkit dogfoods its own delivery mechanism.
skills:
  - waffle-init
  - waffle-setup
  - waffle-install
  - waffle-render
  - waffle-upgrade
  - waffle-doctor
  - waffle-eject
  - waffle-validate
config:
  waffle.toolkitRef:
    required: false
    default: github:dustinkeeton/wafflestack
    description: >-
      npx spec every `/waffle-*` skill invokes as `npx --yes <ref> <subcommand>` —
      the same knob as the doctor CI workflow's `doctor.toolkitRef`. PIN IT to a release
      tag, e.g. "github:dustinkeeton/wafflestack#v0.10.0": that freezes the toolkit version
      the wrappers run (and matches the version this repo is pinned to), and since #373 it is
      the only value on which the writing skills work at all. The default is UNPINNED, which
      resolves to the toolkit's DEFAULT BRANCH — not the latest release — so `/waffle-render`,
      `/waffle-install`, `/waffle-upgrade` and `/waffle-reinstall` will REFUSE, with an error
      naming the exact pinned command to run instead. (That refusal is the feature: an unpinned
      render writes unreleased content while stamping the last released version number into your
      lock, which is what silently breaks `doctor --verify-render` in CI.) `/waffle-doctor`,
      `/waffle-setup`, `/waffle-init`, `/waffle-eject` and `/waffle-validate` read no toolkit
      content and keep working either way. Developing the toolkit ITSELF? Point this at a local
      checkout path, or use `node installer/cli.mjs --allow-unreleased` directly — rendering a
      working tree is the one case where unreleased content is the point.

name: engineering-team
description: >-
  Product-engineering specialist roster — lead-engineer (the general
  architect / tech lead), data-engineer, qa-engineer, devops-engineer,
  ux-designer, and a remediating security-engineer, plus a browser-app
  webapp-security-audit skill. Agents are stack-agnostic skeletons; the stack,
  structure, pyramid, and briefs are project config. Pairs with the
  github-workflow stack (git-workflow/issue/github-project-management skills
  are referenced throughout) and slots into the orchestration stack's roster.
agents:
  [
    lead-engineer,
    data-engineer,
    qa-engineer,
    devops-engineer,
    ux-designer,
    security-engineer,
  ]
skills: [webapp-security-audit]
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Plotto".
  project.longName:
    required: true
    description: Full prose project descriptor, e.g. "the Plotto lottery-analysis app".
  # #218 — the SINGLE-PROGRAM guard, on all four pre-flight commands. A project command reaches the
  # harness as a `Bash(<cmd>:*)` allowlist grant, which matches a command by its LEADING PROGRAM, so
  # a compound value (`tsc --noEmit && eslint .`) renders a grant that can match NOTHING: the call is
  # silently denied and the check never runs. The value is the consumer's, interpolated verbatim, so
  # the class is closed HERE — at the point of use — rather than by linting the templates downstream.
  # Byte-identical in code-quality / orchestration / github-workflow; guards union toolkit-wide.
  project.lintCmd:
    required: false
    default: npm run lint --if-present
    # Unquoted operators only: a `|` or `;` INSIDE a quoted argument (`jest -t "foo|bar"`) is not
    # an operator — the command is still one program, and rejecting it would make this guard
    # worse than the hole it closes.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)(?:''[^''\r\n]*''|"[^"\r\n]*"|[^;|&\r\n])*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`, so an
      unquoted `&&` / `||` / `;` / `|` / `&`, a `cd ` prefix, a `$(…)`/backtick substitution or a
      newline can never match and the call is silently denied. Split a compound into an
      npm-script-style single entry point (e.g. `npm run ci`) and set that here (#218).
    description: >-
      Lint/format check command referenced in agent pre-flight guidance. Must be ONE program the
      allowlist can grant as `Bash(<cmd>:*)` — no `&&` / `||` / `;` / `|`, no `cd ` prefix, no
      `$(…)`/backtick substitution, no newline. Wrap a compound in an npm-script-style single
      entry point (`npm run ci`) instead.
  project.typecheckCmd:
    required: false
    default: npx tsc --noEmit --skipLibCheck
    # Unquoted operators only: a `|` or `;` INSIDE a quoted argument (`jest -t "foo|bar"`) is not
    # an operator — the command is still one program, and rejecting it would make this guard
    # worse than the hole it closes.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)(?:''[^''\r\n]*''|"[^"\r\n]*"|[^;|&\r\n])*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`, so an
      unquoted `&&` / `||` / `;` / `|` / `&`, a `cd ` prefix, a `$(…)`/backtick substitution or a
      newline can never match and the call is silently denied. Split a compound into an
      npm-script-style single entry point (e.g. `npm run ci`) and set that here (#218).
    description: >-
      Type-check command referenced in agent pre-flight guidance. Must be ONE program the allowlist
      can grant as `Bash(<cmd>:*)` — no `&&` / `||` / `;` / `|`, no `cd ` prefix, no
      `$(…)`/backtick substitution, no newline.
  project.testCmd:
    required: false
    default: npm test
    # Unquoted operators only: a `|` or `;` INSIDE a quoted argument (`jest -t "foo|bar"`) is not
    # an operator — the command is still one program, and rejecting it would make this guard
    # worse than the hole it closes.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)(?:''[^''\r\n]*''|"[^"\r\n]*"|[^;|&\r\n])*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`, so an
      unquoted `&&` / `||` / `;` / `|` / `&`, a `cd ` prefix, a `$(…)`/backtick substitution or a
      newline can never match and the call is silently denied. Split a compound into an
      npm-script-style single entry point (e.g. `npm run ci`) and set that here (#218).
    description: >-
      Test command the qa-engineer runs and reports on. Must be ONE program the allowlist can grant
      as `Bash(<cmd>:*)` — no `&&` / `||` / `;` / `|`, no `cd ` prefix, no `$(…)`/backtick
      substitution, no newline.
  project.buildCmd:
    required: false
    default: npm run build
    # Unquoted operators only: a `|` or `;` INSIDE a quoted argument (`jest -t "foo|bar"`) is not
    # an operator — the command is still one program, and rejecting it would make this guard
    # worse than the hole it closes.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)(?:''[^''\r\n]*''|"[^"\r\n]*"|[^;|&\r\n])*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`, so an
      unquoted `&&` / `||` / `;` / `|` / `&`, a `cd ` prefix, a `$(…)`/backtick substitution or a
      newline can never match and the call is silently denied. Split a compound into an
      npm-script-style single entry point (e.g. `npm run ci`) and set that here (#218).
    description: >-
      Production build command (pre-flight guidance and bundle-output secret scan). Must be ONE
      program the allowlist can grant as `Bash(<cmd>:*)` — no `&&` / `||` / `;` / `|`, no `cd `
      prefix, no `$(…)`/backtick substitution, no newline.
  project.lockfile:
    required: false
    default: package-lock.json
    description: Committed lockfile name (e.g. pnpm-lock.yaml) checked against package.json drift.
  planner.productDocsDir:
    required: false
    default: docs/product/
    description: Directory where user stories / product briefs live (read by qa-engineer).
  lead.adrDir:
    required: false
    default: docs/adr/
    description: Directory where the lead engineer files architecture decision records (ADRs).
  lead.stack:
    required: true
    description: Verbatim body of the lead-engineer "Stack (locked)" section — the project's approved technology list.
  lead.structure:
    required: true
    description: Verbatim body of the lead-engineer "Structure" section — module layout and boundary rules.
  lead.delegation:
    required: true
    description: >-
      Verbatim sentence(s) completing the lead-engineer "Delegate." principle —
      which specialist gets which kind of work, e.g. "UX work to `ux-designer`,
      tests to `qa-engineer`, …. Use the `Agent` tool to invoke them."
  data.brief:
    required: true
    description: >-
      Verbatim block dropped into the data-engineer agent: the project's data
      source(s) (endpoints, shapes, quirks), data-module layout, and guidance for
      the analytical insights the project derives. Markdown sections welcome.
  qa.pyramid:
    required: true
    description: Verbatim body of the qa-engineer "Test pyramid" section — the project's test tiers with tooling and mocking boundaries.
  qa.fixtures:
    required: true
    description: Verbatim body of the qa-engineer "Fixtures" section — where fixtures live and how they are captured.
  devops.ci:
    required: true
    description: Verbatim body of the devops-engineer "CI baseline" section — the ordered pipeline steps.
  devops.dependencies:
    required: true
    description: Verbatim body of the devops-engineer "Dependencies" section — package manager, update automation, and major-version policy.
  ux.guidelines:
    required: true
    description: >-
      Verbatim block dropped into the ux-designer agent: the project's design
      system (palette, typography, density, motion) and any chart/component
      standards. Markdown sections welcome.
  security.agentGitignore:
    required: true
    description: Plain (non-code-formatted) list of sensitive paths for the security-engineer's gitignore check, e.g. ".env, data.json, .synapse/, node_modules/".
  security.threatModel:
    required: true
    description: Verbatim bullet list of the project's real attack surface (external APIs, external processes, file access, secret storage).
  sec.threatModelIntro:
    required: true
    description: >-
      Verbatim intro paragraph of the webapp-security-audit skill describing the
      app's actual threat surface (what exists, what doesn't — server, auth, PII).
  sec.dataSource:
    required: true
    description: The untrusted external data source named in validation guidance, e.g. "calottery.com".
  sec.auditCmd:
    required: false
    default: npm audit --omit=dev
    description: Production-dependency audit command, e.g. "pnpm audit --prod".

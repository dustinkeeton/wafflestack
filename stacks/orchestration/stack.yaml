name: orchestration
description: Multi-agent orchestration — a project-manager coordinator (delivery ceremonies, issue routing), a product-manager (product evolution — user stories, acceptance criteria, backlog priority), and a task-planner tracker plus delegate, autopilot, audit, and docs skills that fan issues and pipelines out to specialist agents. Autopilot is the unattended backlog runner that composes delegate (batch mode + auto-merge), clean-up, and git-workflow into a plan→implement→PR loop. The agent roster and module map are project config. Pairs with the github-workflow stack (git-workflow, issue, and github-project-management skills are referenced throughout).
agents: [project-manager, product-manager, task-planner]
skills: [delegate, autopilot, audit, docs, standup]
# Cross-stack skill dependencies pulled in when an item is installed on its own.
requires:
  skills/delegate:
    - skills/git-workflow
    - skills/github-project-management
    - skills/github-project-board
  skills/autopilot:
    - skills/delegate
    - skills/clean-up
    - skills/git-workflow
    - skills/github-project-management
    - skills/qa
    - skills/adversarial-review
    - skills/pr-response
    - skills/audit
    - skills/issue
  skills/docs:
    - skills/docs-agent
    - skills/docs-human
# Typed external prerequisites (#47/#129). Only the `command -v` tool probes are `require` (they
# fail `doctor`) — certain in every environment doctor runs; everything auth/label/setting is
# `recommend` (reports, never fails). gh is scoped to the skills that actually drive it, so
# installing only the PM/planner agents is not asked for it. The harness `CLAUDE_CODE_EXPERIMENTAL_
# AGENT_TEAMS` env var stays declared read-compatibly in this stack's `env:` map below (warned at
# render with a harness-settings-aware check), NOT duplicated here.
prerequisites:
  - kind: tool
    name: node
    level: require
    check: command -v node
    description: Node.js (>=18) runs the toolkit renderer the orchestration skills invoke.
  - kind: tool
    name: git
    level: require
    check: command -v git
    description: Git CLI — per-issue worktrees and the branch/commit/PR flow delegate and autopilot drive.
  - kind: tool
    name: gh
    level: require
    check: command -v gh
    items: [skills/delegate, skills/autopilot, skills/audit]
    description: GitHub CLI — reading the issue backlog, opening PRs, and arming auto-merge.
  - kind: scope
    name: gh-auth
    level: recommend
    check: gh auth status
    items: [skills/delegate, skills/autopilot, skills/audit]
    description: An authenticated GitHub CLI session for the backlog/PR calls delegate, autopilot, and audit make.
  - kind: label
    name: waffle-auto-merged
    level: recommend
    check: "gh label list --limit 500 2>/dev/null | grep -q 'waffle-auto-merged'"
    items: [skills/delegate, skills/autopilot]
    description: Paper-trail label delegate/autopilot apply after arming auto-merge (default autoMerge.label); must pre-exist.
  - kind: label
    name: waffle-manual-review
    level: recommend
    check: "gh label list --limit 500 2>/dev/null | grep -q 'waffle-manual-review'"
    items: [skills/autopilot]
    description: Hold label autopilot applies to the follow-up issue it files when the QA gate or the review loop can't converge or the /audit gate hard-blocks a PR on unresolved Critical/High findings (default autopilot.holdLabel); it excludes hold-labeled issues from automatic scope, so this must pre-exist.
  - kind: setting
    name: allow-auto-merge
    level: recommend
    check: "gh api repos/{owner}/{repo} --jq .allow_auto_merge 2>/dev/null | grep -q true"
    items: [skills/delegate, skills/autopilot]
    description: The repo Allow-auto-merge setting must be enabled for delegate/autopilot to arm `gh pr merge --auto`.
setup: |-
  **Auto-merge paper-trail label.** When delegate/autopilot arm auto-merge, they label the PR
  with `autoMerge.label` (default `waffle-auto-merged`); it must pre-exist in the repo —
    gh label create "waffle-auto-merged" --color 0E8A16 --description "Auto-merge was armed on this PR by the harness"

  **QA-gate / review-loop / audit-gate hold label.** When autopilot's opt-in QA gate
  (`autopilot.qaLoop`) can't converge within `autopilot.maxQaRounds`, its opt-in review loop
  can't converge within `autopilot.maxReviewRounds` — or its opt-in `/audit` gate
  (`autopilot.auditStep`) hard-blocks a PR on unresolved Critical/High findings — it files a
  follow-up issue labeled `autopilot.holdLabel` (default `waffle-manual-review`) and
  thereafter excludes hold-labeled issues from automatic scope (all-open / a label / a
  milestone) so a human triages them by number; it must pre-exist —
    gh label create "waffle-manual-review" --color D93F0B --description "Held for human triage — autopilot skips this issue until it is actioned by number"
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Synapse".
  project.longName:
    required: true
    description: Full prose project descriptor, e.g. "the Synapse Obsidian plugin".
  project.buildCmd:
    required: false
    default: npm run build
    description: Production build command run in the delegation pre-flight checklist.
  project.testCmd:
    required: false
    default: npm test
    description: Test command run in delegation pre-flight and post-agent verification.
  project.typecheckCmd:
    required: false
    default: npx tsc --noEmit --skipLibCheck
    description: Type-check command run in delegation pre-flight, post-agent verification, and audit build checks.
  project.lintCmd:
    required: false
    default: npm run lint --if-present
    description: Lint/format check command run in the delegation pre-flight checklist.
  git.cmd:
    required: false
    default: git
    description: >-
      The git invocation used in the spawned-agent commit instruction (same key as the
      github-workflow stack; the bare default never overrides a human's identity). Identity-free
      commands — push, diff, log — stay a bare git. Projects with a bot identity set it to
      'git -c commit.gpgsign=false -c user.name="{{git.botName}}" -c user.email={{git.botEmail}}'
      — the recipe owns the signing posture (an unpinned commit.gpgsign stays ambient and would
      sign bot-authored commits with the human's key, or hang on a prompting signer); a signing bot
      pins commit.gpgsign=true plus user.signingkey instead. This stack does NOT
      declare those identity keys, so they must be set as real values in project config — a
      recipe leaning on the github-workflow stack's defaults renders them literally here.
      Their pattern guards still apply: guards are compiled toolkit-wide, so a command
      substitution or quote-breaking name is rejected here too, github-workflow or not.
  git.coAuthorTrailer:
    required: false
    default: "Co-Authored-By: {{harness.assistantName}} <noreply@anthropic.com>"
    description: Attribution trailer spawned agents must end commits with (same as the github-workflow stack key).
  git.agentIdentities:
    required: false
    default: {}
    # Identical entryPatterns to the github-workflow stack's declaration (#156). Guards are
    # compiled toolkit-wide and a key guarded twice must satisfy BOTH, so these must not drift:
    # any divergence silently tightens the effective guard. The delegate skill is this key's
    # consumer, and it renders here whether or not github-workflow is installed.
    entryPatterns:
      botName: '^(?!.*\$\{\{)[A-Za-z0-9._\[\]-]+(?: [A-Za-z0-9._\[\]-]+)*$'
      botEmail: '^(?!.*\$\{\{)[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
      signingKey: '^(?!.*\$\{\{)[A-Za-z0-9._/~+:-]+$'
    description: >-
      Per-agent virtualized git identities (same key as the github-workflow stack), consumed by
      the delegate skill's "Per-agent commit identity" section: each spawned agent commits under
      its own author, derived from the resolved git.cmd (display name from the agent's
      `identity.displayName` frontmatter; email = the bot email plus-addressed with
      `+<agent-slug>`, or used verbatim when the base cannot subaddress — a
      `*.noreply.github.com` domain, or a local part that already carries a `+`). An entry here
      overrides that derived default per field — botName replaces
      the name, botEmail replaces the email verbatim, signingKey appends `-c user.signingkey=`
      AFTER the base flags (non-empty; omit the leaf to add nothing). signingKey SELECTS a key, it
      does not ENABLE signing: git's last-wins `-c` semantics make it effective only when the base
      git.cmd already signs, so under the canonical `commit.gpgsign=false` recipe it is deliberately
      inert. The recipe owns the signing posture for the bot and every agent derived from it.
      Empty (the default) means every agent uses the derived default. INERT WITHOUT THE OPT-IN: a
      bare `git.cmd` means no bot identity is configured, so nothing is virtualized and this map
      does nothing. Shape-validated at render (unknown leaf keys and unsafe values fail loudly).
  git.worktreesDir:
    required: false
    default: .claude/worktrees
    description: Repo-relative directory where per-issue git worktrees are provisioned (keep it gitignored).
  planner.productDocsDir:
    required: false
    default: docs/product/
    description: Directory where product briefs / user stories live (written by product-manager, read by task-planner).
  pm.brief:
    required: true
    description: >-
      Verbatim opening paragraph of the product-manager agent: "You are the senior
      product manager for <project>, <what it is>. The audience is <who> — so <tone rule>."
  pm.principles:
    required: true
    description: Verbatim additional bullet(s) appended to the product-manager "Principles" list — the project's domain principles.
  pm.handoffs:
    required: true
    description: Verbatim body of the product-manager "Hand-offs" section — arrow list routing question types to specialist agents.
  roster.architectAgent:
    required: false
    default: lead-engineer
    description: Name of the architecture-audit agent spawned by the audit chain and the docs pipeline (the engineering-team stack's general architect by default).
  roster.securityAgent:
    required: false
    default: security-engineer
    description: Name of the security-audit agent spawned by the audit chain (the engineering-team stack's remediating security agent by default).
  roster.specialistTable:
    required: true
    description: >-
      Markdown table (header + rows) mapping specialist agent names to their
      areas of responsibility. This is the project agent roster.
  roster.classificationTable:
    required: true
    description: >-
      Markdown table (header + rows) mapping issue keywords / source paths to
      specialist agents. This is the roster's issue-to-agent module map.
  roster.labelFallback:
    required: true
    description: >-
      Markdown table (header + rows) mapping GitHub issue labels to specialist
      agents, used when no keyword/path matches.
  roster.rootFiles:
    required: true
    description: >-
      Root/shared files whose edits force serialization (module map), rendered
      as an inline comma-separated list.
  roster.sharedModule:
    required: true
    description: The shared-code module that acts as a serialization bottleneck (module map).
  roster.moduleDependencies:
    required: true
    description: >-
      Ordered inter-module dependency rule that forces serial execution
      (module map), rendered as a single serialization bullet.
  roster.rootFileExample:
    required: false
    default: "`main.ts`"
    description: Illustrative root file name used in the serialization guidance.
  delegate.defaultScope:
    required: false
    default: current-milestone
    description: >-
      What `/delegate` with no arguments delegates: `current-milestone` (the
      earliest-due open milestone, for repos that plan with milestones),
      `all-open` (every open issue, guarded by the confirmation gate — for
      repos that don't use milestones), or `todo-column` (the open issues in
      the project board's "Todo" Status column; a missing board or missing
      Todo option falls back to `all-open`, stated explicitly in the plan —
      never silently — while an empty Todo column stops instead of widening,
      and a failed board lookup — API error, missing token scope — stops
      rather than falling back).
  delegate.extraPreflight:
    required: false
    default: ""
    description: >-
      Optional extra pre-flight gates appended to the spawned-agent prompt's
      checklist step, formatted as additional "- " bullets (e.g. privacy checks,
      "don't hand-edit generated docs" rules). Empty (default) renders nothing.
  delegate.checkpointDir:
    required: false
    default: "{{git.worktreesDir}}/.delegate"
    description: >-
      Repo-relative directory for per-run delegate checkpoint files (typed phase
      state, one JSON doc per run). Defaults under the worktrees dir so it inherits
      the same gitignore — keep it gitignored, it is throwaway run state.
  delegate.approveBeforePush:
    required: false
    default: false
    description: >-
      Opt-in human approval gate immediately before push. When true, each delegated
      agent runs its pre-flight, commits locally, and STOPS before `git push` /
      `gh pr create`; the orchestrator presents a per-agent summary (branch, target
      issue, diffstat, commit list), collects the human's approval via AskUserQuestion,
      and only then is the branch pushed and the PR opened. A rejection leaves the
      worktree/branch local and intact and is recorded in the run report (execution
      `approval`/`approvedBy`, status `skipped`). Default false — agents push
      autonomously, behavior unchanged.
  delegate.autoMerge:
    required: false
    default: false
    description: >-
      Opt-in post-green auto-merge arming for delegate-spawned PRs. When true, after
      an agent (or the orchestrator) runs `gh pr create` it arms the PR with
      `gh pr merge --auto --merge` so it merges itself once the base branch's required
      checks pass — instead of stalling on a human merge (the batch/autopilot path).
      Consent is per-run, never assumed: `--auto` only arms when the repo has "Allow
      auto-merge" enabled AND a required status check is configured for the base branch;
      if arming fails the PR is left open-but-not-armed — never an immediate or `--admin`
      merge. Merge commits, not squash (squash is disabled on this repo). The Report
      phase records per-PR whether auto-merge armed. Default false — PRs wait for a
      human to merge, behavior unchanged.
  autoMerge.label:
    required: false
    default: waffle-auto-merged
    description: >-
      Label applied to a PR immediately after auto-merge is successfully armed
      (`gh pr merge --auto`), as a durable paper trail that automation — not a human —
      queued the merge (filter with `is:pr label:<value>`). Applied only on a successful
      arm (means "armed," not "attempted"). Must pre-exist in the repo — `gh pr edit
      --add-label` will not create it.
  delegate.batchMode:
    required: false
    default: false
    description: >-
      Opt-in non-interactive batch mode for unattended runs (the autopilot backlog
      runner). When true AND the invoker supplied explicit scope (an issue list, a
      milestone, a label, a keyword, or the all-open / todo-column defaults), the Phase 3 confirmation
      gate is skipped: explicit scope stands in for the human accepting the plan, and the
      plan that would have been shown is logged instead so the run stays auditable. An
      ambiguous classification falls back to the safest choice — serial execution in the
      main checkout — rather than pausing. Batch mode changes only those decision points;
      classification, parallelization rules, worktree isolation, serial chains, per-issue
      PRs, and board updates are unchanged. It composes with delegate.autoMerge (the fully
      unattended path) and must NOT weaken delegate.approveBeforePush — if that pre-push
      gate is on it still stops each agent before push. If batchMode is true but scope was
      not explicit, delegate falls back to interactive confirmation. Default false —
      the interactive confirmation gate behaves exactly as before.
  delegate.memoryFile:
    required: false
    default: "{{delegate.checkpointDir}}/memory.md"
    description: >-
      Path to the curated run-memory doc — ONE Markdown file per repo of durable,
      forward-useful facts (repo quirks, recurring failures, issue entanglements) that
      the Report phase distils into and the Classify/Plan phases read back. Defaults
      alongside the per-run checkpoints under the worktrees dir, so it inherits the same
      gitignore. Note the trade-off: like the checkpoints, this persists locally but is
      per-clone (not committed), so memory does not follow the repo to another machine.
  delegate.memoryMaxBytes:
    required: false
    default: 4096
    description: >-
      Hard byte cap on the run-memory doc, enforced deterministically by memory.mjs. The
      doc is curated (prune + rewrite), never blind-appended, precisely so it stays a
      compact working set instead of an ever-growing log that poisons context. Exceeding
      the cap fails the Report gate and forces curation before the run may complete — raise
      it deliberately, never to dodge pruning. Default 4096 (a few KB — room for ~a dozen
      tight entries).
  autopilot.autoMerge:
    required: false
    default: false
    description: >-
      Per-run auto-merge consent for the autopilot backlog runner — whether an autopilot
      run may arm `gh pr merge --auto --merge` on the PRs it opens. When true, autopilot
      sets delegate.autoMerge for the run so each PR arms itself once the base branch's
      required checks pass; when false (the default) every PR is opened and left for human
      review. Consent is captured fresh every invocation and is NEVER sticky — there is no
      carry-over from a prior run, and autopilot never reads a previous run's consent from
      any checkpoint or memory. Same guardrails as delegate.autoMerge: `--auto` only arms
      when the repo has "Allow auto-merge" enabled AND a required status check is configured
      for the base branch; if arming fails the PR is left open-but-not-armed — never an
      immediate or `--admin` merge. Default false — PRs wait for a human, behavior off.
  autopilot.planDir:
    required: false
    default: "{{git.worktreesDir}}/.autopilot"
    description: >-
      Repo-relative directory where the autopilot plan-context writes one implementation
      plan file per issue (`issue-<N>.md`), which the fresh implementer context then
      receives in its prompt as a brief. Defaults under the worktrees dir so it inherits
      the same gitignore — these are throwaway run artifacts, not committed.
  autopilot.reviewLoop:
    required: false
    default: false
    description: >-
      Per-run consent for the autopilot adversarial-review → pr-response loop — whether an
      autopilot run reviews each PR after it goes green (and before it is armed or left for a
      human) the way `/adversarial-review` and `/pr-response` do by hand. INDEPENDENT of
      autopilot.autoMerge: the loop can run on a PR that will then be armed OR on one left for
      human review (cleaning it up first). When true, autopilot withholds auto-merge arming from
      the delegate run, waits for each PR to go green, then loops up to autopilot.maxReviewRounds
      rounds of `adversarial-review <PR#>` → `pr-response <PR#> --yes`, converging when a round
      implements 0 findings, and arms auto-merge itself afterward if that was also consented.
      Consent is captured fresh every invocation and is NEVER sticky — no carry-over from a prior
      run, never read from a checkpoint or memory. Default false — no review loop, behavior
      unchanged.
  autopilot.maxReviewRounds:
    required: false
    default: 2
    description: >-
      Hard cap on the number of adversarial-review → pr-response rounds the review loop runs per
      PR before giving up on convergence (only consulted when autopilot.reviewLoop is on). A round
      that implements 0 findings converges and breaks early; reaching the cap without converging is
      a safety bound, NOT a merge blocker — autopilot proceeds (arms if consented, else leaves the
      PR for a human) and files an autopilot.holdLabel-labeled follow-up issue capturing the last
      adversarial-review findings so the remaining work isn't lost. Raise it as the pr-response
      rubric matures — more rounds buy more quality once each round is trustworthy. Default 2.
      This is the render-time DEFAULT: a single run may override it with `+review:N` in the
      autopilot invocation (captured alongside the consent, per-run, never sticky — this rendered
      value governs every run that doesn't say otherwise).
  autopilot.qaLoop:
    required: false
    default: false
    description: >-
      Per-run consent for the autopilot qa → pr-response functional-QA loop — whether an autopilot
      run QAs each PR after it goes green (ahead of the review loop, the audit gate, and arming),
      checking the change against the linked issue's intent/acceptance criteria and its test
      coverage the way `/qa` and `/pr-response` do by hand. INDEPENDENT of autopilot.autoMerge,
      autopilot.reviewLoop, and autopilot.auditStep: any combination may be on. When true, autopilot
      withholds auto-merge arming from the delegate run, waits for each PR to go green, then loops
      up to autopilot.maxQaRounds rounds of `qa <PR#>` → `pr-response <PR#> --yes`, converging when
      a round implements 0 findings; it arms auto-merge itself afterward only if that was also
      consented AND the review loop and audit gate are both off — otherwise the last enabled gate
      arms. Consent is captured fresh every invocation and is NEVER sticky — no carry-over from a
      prior run, never read from a checkpoint or memory. Default false — no QA gate, behavior
      unchanged.
  autopilot.maxQaRounds:
    required: false
    default: 2
    description: >-
      Hard cap on the number of qa → pr-response rounds the QA gate runs per PR before giving up on
      convergence (only consulted when autopilot.qaLoop is on). A round that implements 0 findings
      converges and breaks early; reaching the cap without converging is a safety bound, NOT a merge
      blocker — autopilot proceeds (arms if consented and the QA gate is the last gate that is on,
      else defers to the later gates or leaves the PR for a human) and files an
      autopilot.holdLabel-labeled follow-up issue capturing the last QA findings so the remaining
      work isn't lost. Default 2. This is the render-time DEFAULT: a single run may override it
      with `+qa:N` in the autopilot invocation (captured alongside the consent, per-run, never
      sticky — this rendered value governs every run that doesn't say otherwise).
  autopilot.holdLabel:
    required: false
    default: waffle-manual-review
    description: >-
      Label autopilot applies to the follow-up issue it files when the QA gate exhausts
      autopilot.maxQaRounds without converging (autopilot.qaLoop), when the review loop exhausts
      autopilot.maxReviewRounds without converging, OR when the /audit gate hard-blocks a PR on
      unresolved Critical/High findings (autopilot.auditStep). It marks the issue as held for
      human triage: autopilot's scope resolution EXCLUDES hold-labeled issues from every automatic
      scope form (all-open, a label, or a milestone) — only naming the issue explicitly by #N
      re-actions it. Must pre-exist in the repo — `gh issue edit --add-label` will not create it.
      Default waffle-manual-review.
  autopilot.auditStep:
    required: false
    default: false
    description: >-
      Per-run consent for the autopilot /audit gate — whether an autopilot run runs the /audit
      chain on each PR as the FINAL pre-merge quality gate, after the review loop and before the
      merge-wait, scoped to the PR's diff. INDEPENDENT of autopilot.autoMerge and
      autopilot.reviewLoop: any combination may be on. When true, autopilot defers auto-merge
      arming past the review loop out to this gate — it waits for the PR to go green, composes the
      /audit playbook itself (the skill is disable-model-invocation: true, so it is never
      auto-invoked) scoped to the PR's changed paths, owns the Team lifecycle end to end
      (create → run the 6 passes → TeamDelete, even on failure), lands the audit's fixes on the PR
      branch and re-waits for green, then HARD-GATES on unresolved Critical/High findings: such a
      finding blocks the merge (the PR is left for a human with an autopilot.holdLabel follow-up
      issue) EVEN IF auto-merge was consented — autopilot never merges past an unresolved security
      gate. Auto-merge is armed, if consented, only once the gate passes green. Consent is captured
      fresh every invocation and is NEVER sticky — no carry-over from a prior run, never read from a
      checkpoint or memory. Default false — no audit gate, behavior unchanged.
  docs.auditChecklist:
    required: false
    description: >-
      Bullet list (verbatim) of what the Step-1 architecture audit in the docs
      pipeline must cover. Override for projects whose "modules" aren't
      application code (e.g. an agent harness auditing skills/agents/config).
    default: |-
      - New or removed modules, files, commands, settings
      - Changed public APIs or type signatures
      - Dependency changes between modules
      - Any architectural violations or inconsistencies
  docs.machineDocSet:
    required: false
    default: a root `AGENTS.md`, plus a per-feature `AGENTS.md` in each `src/<feature>/` directory where the codebase is organized that way
    description: >-
      One-line phrase naming the machine-doc file set (same key as the
      docs-system stack) — used in the docs and audit orchestrator prompts.
  docs.humanDocSet:
    required: false
    default: "`DECISIONS.md`, `STATUS.md`, and `ARCHITECTURE.md` at the repo root"
    description: >-
      One-line phrase naming the human-doc file set (same key as the
      docs-system stack) — used in the docs and audit orchestrator prompts.
  audit.complianceAgentType:
    required: false
    default: lead-engineer
    description: >-
      Agent (subagent_type) spawned for the project-specific compliance step in
      the audit chain. Defaults to the general architect (engineering-team's
      lead-engineer) for when no domain architect is available; projects with a
      domain architect (e.g. plugin-architect, mobile-architect) should override
      to it.
  audit.complianceLabel:
    required: true
    description: Short label for the project-specific compliance step in the audit chain (chain order + summary table).
  audit.complianceFrontmatterLabel:
    required: true
    description: Compliance-step label as it appears in the skill's frontmatter description.
  audit.complianceTaskLabel:
    required: true
    description: Task/agent-prompt label for the compliance step (also used in the agent-prompt placeholder).
  audit.complianceAgentName:
    required: true
    description: Team-member name used for the compliance-step agent instance (spawn + shutdown).
  audit.complianceDescription:
    required: true
    description: One-line description of what the compliance step verifies (chain-order summary).
  audit.compliancePrompt:
    required: true
    description: Full detailed prompt for the project-specific compliance step, including its "### … (Task 3)" heading.
env:
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"

name: orchestration
description: Multi-agent orchestration — a project-manager coordinator (delivery ceremonies, issue routing), a product-manager (product evolution — user stories, acceptance criteria, backlog priority), and a task-planner tracker plus delegate, autopilot, audit, and docs skills that fan issues and pipelines out to specialist agents. Autopilot is the unattended backlog runner that composes delegate (batch mode + auto-merge), clean-up, and git-workflow into a plan→implement→PR loop. The agent roster and module map are project config. Pairs with the github-workflow stack (git-workflow, issue, and github-project-management skills are referenced throughout).
agents: [project-manager, product-manager, task-planner]
skills: [delegate, autopilot, audit, docs, standup]
# Cross-stack skill dependencies pulled in when an item is installed on its own.
requires:
  skills/delegate:
    - skills/git-workflow
    - skills/github-project-management
    - skills/github-project-board
  skills/autopilot:
    - skills/delegate
    - skills/clean-up
    - skills/git-workflow
    - skills/github-project-management
    - skills/qa
    - skills/adversarial-review
    - skills/pr-response
    - skills/audit
    - skills/issue
  skills/docs:
    - skills/docs-agent
    - skills/docs-human
# Typed external prerequisites (#47/#129). Only the `command -v` tool probes are `require` (they
# fail `doctor`) — certain in every environment doctor runs; everything auth/label/setting is
# `recommend` (reports, never fails). gh is scoped to the skills that actually drive it, so
# installing only the PM/planner agents is not asked for it. The harness `CLAUDE_CODE_EXPERIMENTAL_
# AGENT_TEAMS` env var stays declared read-compatibly in this stack's `env:` map below (warned at
# render with a harness-settings-aware check), NOT duplicated here.
prerequisites:
  - kind: tool
    name: node
    level: require
    check: command -v node
    description: Node.js (>=18) runs the toolkit renderer the orchestration skills invoke.
  - kind: tool
    name: git
    level: require
    check: command -v git
    description: Git CLI — per-issue worktrees and the branch/commit/PR flow delegate and autopilot drive.
  - kind: tool
    name: gh
    level: require
    check: command -v gh
    items: [skills/delegate, skills/autopilot, skills/audit]
    description: GitHub CLI — reading the issue backlog, opening PRs, and arming auto-merge.
  - kind: scope
    name: gh-auth
    level: recommend
    check: gh auth status
    items: [skills/delegate, skills/autopilot, skills/audit]
    description: An authenticated GitHub CLI session for the backlog/PR calls delegate, autopilot, and audit make.
  - kind: label
    name: waffle-auto-merged
    level: recommend
    check: "gh label list --limit 500 2>/dev/null | grep -q 'waffle-auto-merged'"
    items: [skills/delegate, skills/autopilot]
    description: Paper-trail label delegate/autopilot apply after arming auto-merge (default autoMerge.label); must pre-exist.
  - kind: label
    name: waffle-manual-review
    level: recommend
    check: "gh label list --limit 500 2>/dev/null | grep -q 'waffle-manual-review'"
    items: [skills/autopilot]
    description: Hold label autopilot applies to the follow-up issue it files when the QA gate or the review loop can't converge or the /audit gate hard-blocks a PR on unresolved Critical/High findings (default autopilot.holdLabel); it excludes hold-labeled issues from automatic scope, so this must pre-exist.
  - kind: setting
    name: allow-auto-merge
    level: recommend
    check: "gh api repos/{owner}/{repo} --jq .allow_auto_merge 2>/dev/null | grep -q true"
    items: [skills/delegate, skills/autopilot]
    description: The repo Allow-auto-merge setting must be enabled for delegate/autopilot to arm `gh pr merge --auto`.
setup: |-
  **Auto-merge paper-trail label.** When delegate/autopilot arm auto-merge, they label the PR
  with `autoMerge.label` (default `waffle-auto-merged`); it must pre-exist in the repo —
    gh label create "waffle-auto-merged" --color 0E8A16 --description "Auto-merge was armed on this PR by the harness"

  **QA-gate / review-loop / audit-gate hold label.** When autopilot's opt-in QA gate
  (`autopilot.qaLoop`) can't converge within `autopilot.maxQaRounds`, its opt-in review loop
  can't converge within `autopilot.maxReviewRounds` — or its opt-in `/audit` gate
  (`autopilot.auditStep`) hard-blocks a PR on unresolved Critical/High findings — it files a
  follow-up issue labeled `autopilot.holdLabel` (default `waffle-manual-review`) and
  thereafter excludes hold-labeled issues from automatic scope (all-open / a label / a
  milestone) so a human triages them by number; it must pre-exist —
    gh label create "waffle-manual-review" --color D93F0B --description "Held for human triage — autopilot skips this issue until it is actioned by number"
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Synapse".
  project.longName:
    required: true
    description: Full prose project descriptor, e.g. "the Synapse Obsidian plugin".
  # #218 — the SINGLE-PROGRAM guard (see engineering-team/stack.yaml for the full rationale). A
  # `Bash(<cmd>:*)` grant matches by LEADING PROGRAM, so a compound value renders a dead grant and
  # the call is silently denied. Byte-identical across the four declaring stacks; guards union
  # toolkit-wide, so a value must satisfy every declarer's pattern.
  project.buildCmd:
    required: false
    default: npm run build
    # BAN THE DELIMITERS, not the quotes. The value is spliced VERBATIM into the allowlist:
    #     --allowedTools 'Edit,Write,…,Bash(<cmd>:*),…'
    # The CLI parses that word TEXTUALLY — split on `,`, then read each entry as `Tool(spec)` —
    # BEFORE any shell or quote processing runs. So quoting cannot protect a delimiter: a `,` or a
    # `)` inside a "quoted" argument shatters the list exactly as a bare one does. The delimiters
    # are therefore banned UNCONDITIONALLY, with no quote-awareness anywhere in the pattern:
    #   `,`     separates the allowlist entries. `eslint --ext .js,.jsx,.ts,.tsx src` — the textbook
    #           multi-extension invocation, ONE program, no shell operator — shattered the list into
    #           `Bash(eslint --ext .js` plus junk `.jsx`/`.ts`/`.tsx src:*)` entries. The real command
    #           matched nothing and was SILENTLY DENIED: #218's exact failure mode, delivered through
    #           the mechanism built to eliminate it (#341 review).
    #   `(` `)` delimit the `Bash(…)` rule itself — a `)` closes it early. This also catches `<(…)`.
    #   `'`     terminates the single-quoted shell word (#254: "a single quote must never reach a
    #           shell literal"); `Bash(pytest -k 'not slow':*)` ends the word early and is mangled.
    #   CR/LF   break the `claude_args: >-` folded scalar.
#   LEADING/TRAILING WHITESPACE is banned too, for the same dead-grant reason: `npm test ` grants
#           `Bash(npm test :*)`, and the real `npm test` does not prefix-match a trailing space.
#           (YAML strips it from a plain scalar, so it takes an explicitly quoted value to hit —
#           but the grant it ships is just as dead, so the guard anchors both ends.)
    # …plus the #218 compound class itself (`;` `|` `&`, `$(…)`, backtick, `${{ }}`, a `cd ` prefix),
    # each of which renders a grant no real command can ever match.
    #
    # `:` is NOT banned: the rule's prefix marker is the LAST `:*`, so `npm run test:ci` grants
    # `Bash(npm run test:ci:*)` and matches fine. Banning it would false-reject a huge population.
    # `"` is NOT banned: it is inert at every landing site — literal inside the single-quoted shell
    # word, literal in the folded scalar, literal in a markdown code span, and a literal character in
    # the `Bash(…)` prefix, where it round-trips with the command the agent actually runs. The earlier
    # blanket quote ban rejected `go test -run "TestFoo" ./...` with no failure mode behind it.
    #
    # NO ALTERNATION, NO QUOTED SPANS. An earlier cut tried to permit a quoted `|`/`;` inside an
    # argument. Its fallback class also matched a quote, so the alternation RE-PAIRED the quotes — in
    # `eslint 'a' && prettier 'b'` the closing quote of the first argument and the opening quote of
    # the second were read as one span, swallowing the `&&`, and an ordinary lint command rendered a
    # DEAD GRANT. A flat negated character class cannot re-pair anything, so it stays flat.
    #
    # A guard for a silent-denial bug must fail CLOSED: reject the value, name the remedy, and let the
    # consumer wrap it in an npm script. A false reject is loud and trivially worked around; a false
    # accept is a dead grant nobody ever sees.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)(?!\s)(?!.*\s$)[^;|&'',()\r\n]*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`. It is
      spliced verbatim into `--allowedTools 'Edit,…,Bash(<cmd>:*),…'` — a list the CLI parses
      TEXTUALLY: it splits on `,` and reads each entry as `Tool(spec)`, before any shell or quote
      processing. So quoting cannot protect a delimiter — a `,` or a `)` inside an argument shatters
      the list exactly as a bare one does. Hence no `,`, no `(`/`)`, no `'`, no `&&` / `||` / `;` /
      `|` / `&`, no `cd ` prefix, no `$(…)`/backtick/`<(…)` substitution, and no newline: each
      renders a grant the real command cannot match, so the call is silently denied. Wrap it in an
      npm-script-style single entry point — put the compound (or the comma-separated argument, e.g.
      `eslint --ext .js,.ts .`) inside `package.json` or a Makefile and set this to the one command
      that runs it, e.g. `npm run ci` (#218). A `"` is fine: it is inert at every landing site.
    description: >-
      Production build command run in the delegation pre-flight checklist. Must be ONE program the
      allowlist can grant as `Bash(<cmd>:*)` — no `,` (it separates the allowlist entries), no
      `(`/`)`, no `'`, no `&&` / `||` / `;` / `|`, no `cd ` prefix, no `$(…)`/backtick substitution,
      no newline. Wrap a compound — or a comma-separated argument like `eslint --ext .js,.ts .` — in
      an npm-script-style single entry point (`npm run ci`) instead.

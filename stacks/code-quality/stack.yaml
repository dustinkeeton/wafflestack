name: code-quality
description: >-
  Cross-cutting code-quality practice skills — TDD (red-green-refactor
  discipline, test priority tiers, boundary mocking), codebase-architecture
  (module boundaries, coding conventions), adversarial-review (hostile
  post-green PR review that pokes holes before merge), qa (functional
  post-green QA of a PR against its linked issue's intent and test coverage),
  and dry (disciplined de-duplication under the rule of three and
  semantic-sameness guardrails). Stack-agnostic: the test command, tier
  tables, module map, and settings type are project config.
skills: [tdd, codebase-architecture, adversarial-review, qa, dry]
config:
  project.longName:
    required: true
    description: Full prose project descriptor, e.g. "the Acme web service" or "the Acme CLI".
  project.testCmd:
    required: false
    default: npm test
    # #218: a project command is only grantable as a single-program `Bash(<cmd>:*)` prefix, so a
    # compound value renders a DEAD grant that matches nothing. Rejected at render, not linted later.
    # NO QUOTE CHARACTERS, and no unquoted operators. The value is spliced VERBATIM into the
    # single-quoted `--allowedTools '…'` shell word, and textual substitution cannot know its
    # target context, so escaping is impossible in general (see template.mjs) — the toolkit's
    # documented answer is a pattern that fails LOUDLY. `git.cmd` bans quotes for exactly this
    # reason (#254: "a single quote must never reach a shell literal"); these four keys land in
    # the same kind of shell literal, so they get the same rule.
    #
    # An earlier cut tried to be clever and allow a quoted `|`/`;` inside an argument. It was
    # WRONG TWICE. (1) Its fallback class also matched a quote, so the alternation RE-PAIRED the
    # quotes — in `eslint 'a' && prettier 'b'` the closing quote of the first argument and the
    # opening quote of the second were read as one span, swallowing the `&&`, and an ordinary lint
    # command rendered a DEAD GRANT. (2) Even parsed correctly, a single-quoted value cannot
    # SURVIVE the render: `Bash(pytest -k 'not slow':*)` inside `--allowedTools '…'` terminates the
    # shell word early and the grant is silently mangled — the same silent denial this key exists
    # to prevent. A guard for a silent-denial bug must fail CLOSED: reject the value, name the
    # remedy, and let the consumer wrap it in an npm script. A false reject is loud and trivially
    # worked around; a false accept is a dead grant nobody ever sees.
    pattern: '^(?!.*(?:\$\(|\$\{\{|`))(?!\s*cd\s)[^;|&''"\r\n]*$'
    patternHint: >-
      a project command must be ONE program the allowlist can grant as `Bash(<cmd>:*)`, and it is
      spliced verbatim into a single-quoted shell word — so `&&` / `||` / `;` / `|` / `&`, a `cd `
      prefix, a `$(…)`/backtick substitution, a newline, or a QUOTE character can never match and the
      call is silently denied. Wrap it in an npm-script-style single entry point — put the compound
      (or the quoted argument, e.g. `pytest -k 'not slow'`) inside `package.json` or a Makefile and
      set this to the one command that runs it, e.g. `npm run ci` (#218).
    description: >-
      Test command that runs the project's full suite (referenced throughout the TDD skill).
      Must be ONE program the allowlist can grant as `Bash(<cmd>:*)` — no `&&` / `||` / `;` / `|`,
      no `cd ` prefix, no `$(…)`/backtick substitution, no newline. Wrap a compound in an
      npm-script-style single entry point (`npm run ci`) instead.
  tdd.priorityTiers:
    required: true
    description: Verbatim body of the TDD "Test Priority Tiers" section — the project's module/test-coverage map (tier tables plus the "Do NOT unit test" list).
  tdd.moduleBoundaries:
    required: true
    description: Verbatim text of the TDD architectural import-boundary rule naming the project's feature modules and any documented cross-module dependency exception.
  tdd.workflows:
    required: true
    description: Verbatim body of the "TDD Workflow for New Features" section — the project's feature-specific TDD recipes.
  arch.settingsType:
    required: true
    description: Name of the project's unified settings type, e.g. "AppSettings" or "ProjectConfig".
  arch.depExceptions:
    required: true
    description: Documented inter-module dependency exception(s) allowed by the architecture, e.g. "ModuleA → ModuleB (documented one-way exception)", or "none" if the architecture allows no exceptions.
setup: |-
  **Adversarial review.** The `adversarial-review` skill drives the `gh` CLI against the
  current repo's pull requests — verify `gh auth status` succeeds and the repo has a GitHub
  remote before relying on it. It needs a token with **pull-request read + review-write**
  scope: it reads the full PR diff (`gh pr diff`) and posts findings back as a PR review
  (`gh api …/pulls/N/reviews`). It introduces no config keys and no syrup — nothing to
  configure beyond having `gh` authenticated.

  Invoke it as `/adversarial-review <PR#>` (a `#N`, bare number, or PR URL); omit the
  argument to review the current branch's open PR. It reviews a **finished, CI-green** PR
  from a hostile reviewer's seat — poking holes in correctness edge cases, error handling,
  test depth, API/naming, and simplification — and posts an honest-severity review
  (blocker / should-fix / nit), where "no holes found" is a valid outcome. This is distinct
  from the built-in `/code-review`, which reviews the author's uncommitted working diff; this
  gates a committed, green PR just before merge. Agents can be granted it via their
  frontmatter `skills:` list to gate a PR an auto-merge flow would otherwise merge unchecked.

  A companion **opt-in** workflow in the `github-workflow` stack can auto-run this skill the
  moment a PR's checks turn green, so green PRs get gated without a manual step. It's opt-in —
  enable it in that stack to arm it; until then, invoke the skill manually
  (`/adversarial-review <PR#>`) or from an agent.

  **QA.** The `qa` skill is `adversarial-review`'s functional sibling — same `gh` needs
  (an authenticated session with pull-request read + review-write scope; it reads
  `gh pr diff` and posts one review via `gh api …/pulls/N/reviews`) but it gates a green PR
  against its **linked issue's intent**: it reads the diff plus the issue's acceptance
  criteria, best-effort runs the project's test command and exercises the changed behavior,
  assesses whether the diff carries real test coverage, and posts one honest-severity review
  under its own dedup marker (deliberately distinct from adversarial-review's, so the
  pr-green/pr-response automation never mistakes one gate's post for the other's). "No QA
  concerns" is a valid outcome. Invoke it as `/qa <PR#>`; omit the argument for the current
  branch's open PR. It introduces no config keys — it reuses `project.testCmd` — and it only
  reports; the `pr-response` skill is the half that applies accepted findings. The
  `orchestration` stack's autopilot composes it as an opt-in QA gate (`autopilot.qaLoop`).

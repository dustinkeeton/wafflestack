# TRIAGE FRAGMENT — not a live manifest (nothing under triage/ is read by the
# render/validate pipeline). Verbatim pieces removed from bundles/engineering-team/bundle.yaml
# when its items were parked in round 1 of #38. To restore an item: `git mv` it back,
# re-add its list entry and the config keys below to that bundle.yaml, then re-run
# `npm run validate && node installer/cli.mjs render`.
#
# Removed manifest entries:
#   agents: lead-developer, product-manager, ux-designer, security-engineer
#           (was: agents: [lead-developer, data-engineer, qa-engineer, devops-engineer,
#                          product-manager, ux-designer, security-engineer])
#   skills: [security-audit]
#
# Shared keys still declared in the live bundle (also used by remaining items):
#   project.name, project.lintCmd, project.typecheckCmd, project.testCmd, project.buildCmd
# Two of those had their descriptions trimmed to match the remaining items; the originals were:
#   project.buildCmd:        "Production build command (pre-flight guidance and bundle-output secret scan)."
#   planner.productDocsDir:  "Directory where user stories / product briefs live (written by product-manager, read by qa-engineer)."
# The bundle description's trailing NOTE (browser-app security-audit name collision with
# code-quality's desktop-plugin variant) was removed along with the skill.
#
# Removed config declarations (verbatim):
config:
  project.lockfile:
    required: false
    default: package-lock.json
    description: Committed lockfile name (e.g. pnpm-lock.yaml) checked against package.json drift.
  lead.stack:
    required: true
    description: Verbatim body of the lead-developer "Stack (locked)" section — the project's approved technology list.
  lead.structure:
    required: true
    description: Verbatim body of the lead-developer "Structure" section — module layout and boundary rules.
  lead.delegation:
    required: true
    description: >-
      Verbatim sentence(s) completing the lead-developer "Delegate." principle —
      which specialist gets which kind of work, e.g. "UX work to `ux-designer`,
      tests to `qa-engineer`, …. Use the `Agent` tool to invoke them."
  pm.brief:
    required: true
    description: >-
      Verbatim opening paragraph of the product-manager agent: "You are the senior
      product manager for <project>, <what it is>. The audience is <who> — so <tone rule>."
  pm.principles:
    required: true
    description: Verbatim additional bullet(s) appended to the product-manager "Principles" list — the project's domain principles.
  pm.handoffs:
    required: true
    description: Verbatim body of the product-manager "Hand-offs" section — arrow list routing question types to specialist agents.
  ux.guidelines:
    required: true
    description: >-
      Verbatim block dropped into the ux-designer agent: the project's design
      system (palette, typography, density, motion) and any chart/component
      standards. Markdown sections welcome.
  sec.scope:
    required: true
    description: >-
      Prose fragment completing "You are the security reviewer for <project>, …" —
      e.g. "a client-side React SPA that fetches data from `example.com`".
  sec.threatModelIntro:
    required: true
    description: >-
      Verbatim intro paragraph of the security-audit skill describing the app's
      actual threat surface (what exists, what doesn't — server, auth, PII).
  sec.dataSource:
    required: true
    description: The untrusted external data source named in validation guidance, e.g. "calottery.com".
  sec.auditCmd:
    required: false
    default: npm audit --omit=dev
    description: Production-dependency audit command, e.g. "pnpm audit --prod".
# Per-item key usage (for reference when restoring):
#   agents/lead-developer     → lead.stack, lead.structure, lead.delegation,
#                               project.name/buildCmd/lintCmd/testCmd/typecheckCmd (shared, still declared)
#   agents/product-manager    → pm.brief, pm.principles, pm.handoffs,
#                               planner.productDocsDir + project.name (shared, still declared)
#   agents/ux-designer        → ux.guidelines, project.name (shared, still declared)
#   agents/security-engineer  → sec.scope, sec.dataSource, sec.auditCmd, project.name (shared, still declared)
#   skills/security-audit     → sec.threatModelIntro, sec.dataSource, sec.auditCmd, project.lockfile,
#                               project.name + project.buildCmd (shared, still declared)

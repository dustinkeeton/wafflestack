# TRIAGE FRAGMENT — not a live manifest (nothing under triage/ is read by the
# render/validate pipeline). Verbatim pieces removed from bundles/code-quality/bundle.yaml
# when its items were parked in round 1 of #38. To restore an item: `git mv` it back,
# re-add its list entry and the config keys below to that bundle.yaml, then re-run
# `npm run validate && node installer/cli.mjs render`.
#
# Removed manifest entries:
#   agents: [architect, security]
#   skills: security-audit          (was: skills: [tdd, security-audit, codebase-architecture])
#
# Shared keys still declared in the live bundle (also used by remaining items):
#   project.longName                (used by parked architect + security agents)
#
# Removed config declarations (verbatim):
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Synapse". Used in "the <name> plugin" phrasing.
  security.skillGitignore:
    required: true
    description: Sensitive paths the project must gitignore, formatted as an inline-code list, e.g. "`.env`, `data.json`, `.synapse/`".
  security.dataDir:
    required: true
    description: Project data/proposal directory that file paths must resolve within, formatted as inline code, e.g. "`.synapse/`".
  security.externalTools:
    required: true
    description: External processes the project shells out to, e.g. "yt-dlp, ffmpeg".
  security.mediaFetchTool:
    required: true
    description: Primary external tool that receives user-provided URLs, e.g. "yt-dlp".
  security.agentGitignore:
    required: true
    description: Plain (non-code-formatted) list of sensitive paths for the security agent's gitignore check, e.g. ".env, data.json, .synapse/, node_modules/".
  security.threatModel:
    required: true
    description: Verbatim bullet list of the project's real attack surface (external APIs, external processes, file access, secret storage).
# Per-item key usage (for reference when restoring):
#   agents/architect        → project.longName (shared, still declared)
#   agents/security         → project.longName (shared), security.agentGitignore, security.threatModel
#   skills/security-audit   → project.name, security.skillGitignore, security.dataDir,
#                             security.externalTools, security.mediaFetchTool

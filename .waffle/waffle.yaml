# wafflestack dogfoods itself: github-workflow, docs-system, and orchestration are
# rendered into this repo so /issue, /git-workflow, /clean-up, /delegate, /audit,
# /docs and the docs/PM/planner agents are available when developing the toolkit.
#
# The rendered .claude/ output, the lock, and the doctor CI workflow are COMMITTED
# (like a consuming project) — agents in fresh worktrees and CI read the committed
# skills, and the doctor drift gate (required check on main) is what protects the
# generated files from hand-edits. Deliberately still gitignored: the label-hook
# workflow (committing it would arm a live label→harness dispatch) and the generated
# .waffle/ overview docs — hence doctor runs with --allow-missing. After changing a
# stack, re-render from the working tree and commit the updated render + lock:
#   node installer/cli.mjs render --allow-unreleased
# The flag is required (#373): `render` refuses from a toolkit that is not at a
# release tag, and a working tree never is. It suppresses the refusal, not the truth.
targets: [ claude ]
stacks:
  - github-workflow
  - docs-system
  - orchestration
  - harness-architect
  - wafflestack
include:
  # Paid Claude-dispatch hooks (hygiene, pr-green, pr-response) disarmed 2026-07-15 while the
  # API key is deliberately unfunded — they are EJECTED (see the `eject:` block below), not just
  # dropped from `include:`. #396 removed only the include lines, but the lock still tracked the
  # rendered paths, so `trackedFiles` re-admission (refs.mjs) re-poured them on every render (#414).
  # Ejecting drops the lock entries too, so `render` forgets the paths for good. Re-arm path (#343):
  # remove the three `eject:` entries AND re-install/re-add the includes
  # (`wafflestack install files/.github/workflows/waffle-pr-green-hook.yml`, etc.), then re-render
  # and commit — a funded key must exist first.
  - files/.github/workflows/waffle-release-hook.yml
  - code-quality/skills/adversarial-review
  # The qa skill (#228) — adversarial-review's functional sibling: post-green QA of a PR against
  # its linked issue's intent + test coverage. Autopilot's opt-in QA gate (autopilot.qaLoop)
  # composes it, so render it here (whole-stack installs don't pull requires closures).
  - code-quality/skills/qa
  - files/.github/workflows/waffle-post-merge-hook.yml
config:
  git:
    # #155: the managed Wafflebot identity, injected into the rendered `commit` examples via
    # `-c` flags. BOTH values are committed here rather than split into the gitignored
    # .waffle/waffle.local.yaml (the usual layering for botEmail): this repo commits its
    # render and re-renders it in CI (the audit compliancePrompt runs `render && doctor`)
    # and in fresh delegate worktrees — neither of which has the gitignored overlay, so an
    # overlay-held botEmail would render the placeholder there and red the doctor drift gate.
    # bot@wafflenet.io is already public in this repo's history; nothing is leaked.
    # `user.name` is quoted because git.botName admits interior spaces.
    # `commit.gpgsign=false` is setup-note **recipe A** (#158, tag posture pinned by #252):
    # the recipe owns the signing posture. git.cmd overrides the identity and nothing else, so
    # an ambient `commit.gpgsign = true` would sign a Wafflebot-authored commit with the
    # developer's own key — and a prompting signer (1Password's SSH agent) hangs the
    # non-interactive commit. `tag.gpgSign=false` closes the same class for annotated tags.
    # This repo's posture is therefore: agent commits are deliberately unsigned (no GitHub
    # badge, which is intentional and cleaner than an "Unverified" one). Wafflebot holds no
    # signingKey; adopting recipe B/C would require a bot account with a registered key and a
    # non-prompting signer, and would forfeit the per-agent avatars (#157).
    botName: Wafflebot
    botEmail: bot@wafflenet.io
    # #284: the git.coAuthorTrailer default now credits the repo OWNER via git.ownerName /
    # git.ownerEmail (was an interim hardcoded coAuthorTrailer override). Agent commits that
    # reach main count toward the owner's contribution graph — GitHub credits verified co-author
    # emails on default-branch commits, and this repo merges with merge commits, so branch commits
    # land on main intact. Both keys are COMMITTED here rather than split into the gitignored
    # overlay (same rationale as botEmail above): this repo re-renders in CI and fresh delegate
    # worktrees with no overlay present, so an overlay-held ownerEmail would render the placeholder
    # there and red the doctor drift gate. dustin.keeton49@gmail.com is already public in history
    # and verified on the owner's GitHub account. Naming a real person here is fine — this is THIS
    # repo's committed config, not a toolkit default.
    ownerName: Dustin Keeton
    ownerEmail: dustin.keeton49@gmail.com
    cmd: git -c commit.gpgsign=false -c tag.gpgSign=false -c user.name="{{git.botName}}" -c user.email={{git.botEmail}}
    identitySection: |-
      This project commits agent work under the managed bot identity — the `commit` examples
      below inject it via `-c` flags (`git.cmd`), so the machine's ambient `user.name` /
      `user.email` is never what lands on an agent commit. Identity-free commands (`push`,
      `checkout`, `diff`, `log`) stay a bare `git`. Human commits made outside these examples
      keep the developer's own config and sign normally. **Signing:** `git.cmd` pins
      `commit.gpgsign=false` (and `tag.gpgSign=false`), so agent commits here are deliberately unsigned and carry no
      GitHub verification badge — intentional, not accidental. That posture is the recipe's,
      not the machine's: never add or remove signing flags per-invocation. Every agent-made
      commit must still end with:

      ```
      {{git.coAuthorTrailer}}
      ```
  project:
    name: wafflestack
    longName: the wafflestack agent/skill toolkit
    # These four slots mirror tests.yml's required `test` job; guarded by
    # installer/test/preflight-ci-parity.test.mjs (#375).
    lintCmd: npm run validate
    testCmd: npm test
    typecheckCmd: npm run typecheck
    buildCmd: npm run build
  release:
    # The `release` skill syncs the version line in these files (beyond package.json +
    # lockfile) on a bump. STATUS.md carries a "**Version**: vX.Y.Z" header.
    versionFiles: [ STATUS.md ]
  doctor:
    # The CI drift gate (required check on main) tolerates the deliberately-untracked
    # renders (label-hook workflow, .waffle/ overview docs): only modified files fail;
    # a missing lock still fails.
    #
    # #316 asked for `--verify-render` here as well. It is deliberately NOT here — it runs from
    # .github/workflows/tests.yml instead, as `node installer/cli.mjs doctor --allow-missing
    # --verify-render`. The reason is that --verify-render re-renders the committed config with
    # whatever toolkit it is handed, and the workflow THIS key feeds (waffle-doctor.yml) gets its
    # toolkit from `npx --yes <doctor.toolkitRef>` — by default GitHub's default branch. For a
    # consuming repo that is exactly right: their toolkit really is external. For the toolkit's own
    # repo it is the wrong toolkit, and adding the flag here would fail in BOTH directions:
    #   - a PR that edits stacks/** and correctly re-renders would false-RED (its lock is built
    #     from its own stacks; CI would render with main's), and
    #   - a PR that edits stacks/** and FORGETS to re-render would false-GREEN (main's unchanged
    #     stacks still reproduce the stale lock byte for byte) — a clean pass on the exact bug the
    #     flag exists to catch.
    # Both were reproduced before choosing this shape; see the #316 PR. Pointing toolkitRef at the
    # checkout does not rescue it: `npx --yes .` links the package in place rather than installing
    # it, and this workflow deliberately never runs `npm ci` (a consumer need not be a Node project
    # at all), so the run dies on `Cannot find package 'yaml'`.
    #
    # tests.yml has none of that coupling: it runs `npm ci` first and invokes the CHECKOUT's own
    # CLI, so the render under test is built from the PR's own stacks/**. `test` is already a
    # required check on main, so the gate is armed with no branch-protection change.
    #
    # NB the soundness of --verify-render has nothing to do with this repo committing
    # git.botEmail / git.ownerEmail, which is what #316 supposed. Since #317 the lock records the
    # CANONICAL render — committed inputs only, the gitignored .waffle/waffle.local.yaml overlay
    # excluded by construction — and --verify-render reads those same committed inputs, so the flag
    # is sound for any repo, overlay or not (docs/gitignore.md: "Nobody is ever red-gated into
    # committing a personal value"). What committing those two keys actually buys is the property
    # one level up: it is why this repo can commit its RENDER at all, since a render-affecting
    # overlay would bake a personal value into a committed .claude/ file.
    flags: --allow-missing
  hygiene:
    # #82: this repo dogfoods the scheduled hygiene hook, and its own skill prompts steer the
    # dispatched harness to run the toolkit CLI DIRECTLY — `node installer/cli.mjs doctor
    # --allow-missing` is the docs.auditChecklist drift item the docs skill runs in its audit
    # pass (and audit/delegate run `render`/`validate` the same way). The baked allowlist covers
    # the npm-run pre-flight wrappers but not those direct calls, so extend it through the
    # documented claudeArgs consumer-extras hook: the Claude CLI unions repeated --allowedTools,
    # so this ADDS `Bash(node installer/cli.mjs:*)` to the default rather than replacing it.
    # (Single quotes only — the claudeArgs pattern rejects double quotes, backslashes, and ${{ }}.)
    claudeArgs: "--allowedTools 'Bash(node installer/cli.mjs:*)'"
  pm:
    # product-manager (orchestration stack, #38 round 2) — product evolution for
    # the toolkit itself: stack shapes, config-key surface, consumer ergonomics.
    brief: >-
      You are the senior product manager for wafflestack, an agent/skill toolkit
      that renders canonical definitions into harness-native files for consuming
      projects. The audience is developers wiring agent tooling into their own
      repos — so be concrete, mechanism-first, and ruthless about scope.
    principles: |-
      - **Stacks are the product.** Every proposal names the stack(s) it touches and keeps one grouping philosophy per stack.
      - **Consumer ergonomics beat toolkit convenience.** Config keys, defaults, and setup notes are user-facing surface — weigh every new required key.
    handoffs: |-
      - Installer / render / CLI mechanics, stack/skill/agent authoring, harness design → harness-architect
      - Machine docs → docs-agent; human docs → docs-human
      - Delivery sequencing and issue routing → project-manager
  docs:
    # This repo's "modules" are stacks + installer libs, not src/ features — one
    # root registry replaces the default per-feature machine-doc shape.
    machineDocSet: a single root `AGENTS.md` registry
    machineDocSpec: |-
      ## Documentation Files

      ### `AGENTS.md` (root)

      Single machine-doc registry for the toolkit. Contains:

      - Project purpose (1-2 sentences)
      - Stack registry: table of stacks with path, description, skills, agents
      - Installer module registry: table of `installer/lib/*.mjs` files with exported
        functions (full signatures) and purpose
      - CLI command registry: table of `wafflestack <cmd>` commands with behavior
      - Template semantics summary: placeholder syntax, `harness.*` namespace,
        nested substitution, extension points
      - Consuming-project contract: config / local overlay / lock / extensions files
      - Build/test commands

      ## Format Rules

      1. Use language-tagged fenced code blocks (e.g. ```js) for exported signatures and examples
      2. Use tables for registries and enumerations
      3. Use `file.mjs:42` format for source references (line number after the colon)
      4. No markdown emphasis (bold/italic) in structured sections
      5. Frontmatter with `last-updated` timestamp (YYYY-MM-DD)
      6. Keep the file under 300 lines — the stack registry summarizes; per-stack
         detail stays in each `stack.yaml`
    voiceGuardrailSection: |-
      ## Owner-voiced docs — do not rewrite

      `README.md`, `schema/FORMAT.md`, and `schema/SETUP.md` are owner-voiced
      canonical documents (the schema files ship to consumers via npx). Never
      rewrite them in a docs pass — if they have drifted from reality, flag the
      drift in your report instead.
    # No architecture skill is rendered here; the toolkit's conventions live in
    # this file, which the docs agents read in its place.
    architectureSkill: schema/FORMAT.md
    auditChecklist: |-
      - New or removed stacks, skills, agents, config keys, or CLI commands
      - Changed installer exports or template semantics (`installer/lib/*.mjs`)
      - `stack.yaml` config declarations out of sync with placeholder usage
      - Rendered-output drift: `node installer/cli.mjs doctor --allow-missing` clean
        (committed render + lock in sync — re-render and commit after stack edits, with
        `node installer/cli.mjs render --allow-unreleased`: #373 makes `render` refuse from a
        non-release toolkit, and a branch checkout never is one; plain `doctor` needs no flag);
        `.gitignore` still covers the deliberately-untracked renders (label-hook
        workflow, worktrees, `.waffle/` overview docs)
  roster:
    # harness-architect is this repo's specialist for all toolkit work — installer/CLI,
    # stacks, skills, agent defs, and config keys (the harness-architect stack is enabled,
    # waffle.yaml:18). docs-agent/docs-human own the machine/human docs. architectAgent runs
    # the audit-pass-1 / docs-first-pass architecture review, which here IS the installer/stack/
    # harness architecture, so it routes to harness-architect. securityAgent stays general-purpose:
    # harness-architect is not a security auditor and no security-engineer is installed.
    architectAgent: harness-architect
    securityAgent: general-purpose
    specialistTable: |-
      | Agent | Responsibility |
      |-------|----------------|
      | harness-architect | The toolkit itself: installer/CLI (`installer/**`: JS + tests), stack/skill/agent authoring and config keys (`stacks/**`, `schema/**`: markdown + YAML), the render pipeline, and harness design |
      | docs-agent | Machine docs (root `AGENTS.md` registry) |
      | docs-human | Human docs (`DECISIONS.md`, `STATUS.md`, `ARCHITECTURE.md`) |
      | general-purpose | Catch-all for work that fits no specialist above |
    classificationTable: |-
      | Signal (keywords / paths) | Agent |
      |---------------------------|-------|
      | installer, CLI, render, doctor, eject, template, `installer/**` | harness-architect |
      | stack, skill, agent definition, config key, `stacks/**`, `schema/**` | harness-architect |
      | docs, AGENTS.md, architecture/status docs | docs-agent (machine) / docs-human (human) |
    labelFallback: |-
      | Label | Agent |
      |-------|-------|
      | bug | harness-architect |
      | enhancement | harness-architect |
      | documentation | docs-agent |
      | question | harness-architect |
    rootFiles: toolkit.yaml, package.json, installer/cli.mjs, schema/FORMAT.md, README.md
    sharedModule: installer/lib/ (render pipeline — every CLI command and test imports it)
    moduleDependencies: stack content depends on installer template semantics —
      `installer/lib` changes merge before dependent `stacks/**` changes.
    rootFileExample: "`toolkit.yaml`"
  delegate:
    # This repo does not plan with milestones (none exist).
    defaultScope: all-open
    extraPreflight: |-
      - `npm run validate` passes after any stack/manifest edit
      - If `stacks/**` changed: re-run `node installer/cli.mjs render --allow-unreleased` and commit the updated render + lock (the doctor CI gate fails on drift) — never hand-edit rendered `.claude/` output. The flag is required (#373): `render` refuses from a toolkit that is not at a release tag, and a feature branch never is. It suppresses the refusal, not the truth.
  audit:
    complianceAgentType: general-purpose
    complianceLabel: Toolkit integrity
    complianceFrontmatterLabel: toolkit integrity
    complianceTaskLabel: Toolkit integrity check
    complianceAgentName: toolkit-integrity
    complianceDescription: Validates manifests, placeholders, tests, and render/lock
      integrity (validate + test + render + doctor).
    compliancePrompt: |-
      ### Toolkit integrity (Task 3)

      Run the toolkit's own checks in order and report violations:

      1. `npm run validate` — manifests parse, frontmatter is complete, every placeholder is declared
      2. `npm test` — installer suite passes
      3. `node installer/cli.mjs render --allow-unreleased && node installer/cli.mjs doctor` — rendered output matches the lock (no hand-edits to generated `.claude/` files). The flag is required (#373): `render` refuses from a toolkit that is not at a release tag, and a branch checkout never is; plain `doctor` is not gated and needs nothing.
      4. Spot-check changed stacks: every placeholder used in content is declared in that `stack.yaml`; `setup:` notes contain no placeholders

      Fix what your role permits (source side only, then re-render); otherwise report each failure with the command output quoted.
# The three paid Claude-dispatch hooks, released to project ownership so `render` no longer pours
# them (#414 finishes the #396 disarm — de-selecting alone left them lock-tracked and re-poured).
# Project-owned now means: nothing re-creates these files, and a `git add -A` cannot silently
# re-arm pr-green's paid dispatch. See the `include:` re-arm note above.
eject:
  - files/.github/workflows/waffle-hygiene.yml
  - files/.github/workflows/waffle-pr-green-hook.yml
  - files/.github/workflows/waffle-pr-response-hook.yml

name: engineering-team
description: >-
  Delivery-specialist agent roster — data-engineer, qa-engineer, and
  devops-engineer. Agents are stack-agnostic skeletons; the data brief, test
  pyramid, and CI baseline are project config. Pairs with the github-workflow
  bundle (git-workflow and github-project-management skills are referenced
  throughout) and slots into the orchestration bundle's roster.
agents: [data-engineer, qa-engineer, devops-engineer]
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Plotto".
  project.lintCmd:
    required: false
    default: npm run lint --if-present
    description: Lint/format check command referenced in agent pre-flight guidance.
  project.typecheckCmd:
    required: false
    default: npx tsc --noEmit --skipLibCheck
    description: Type-check command referenced in agent pre-flight guidance.
  project.testCmd:
    required: false
    default: npm test
    description: Test command the qa-engineer runs and reports on.
  project.buildCmd:
    required: false
    default: npm run build
    description: Production build command (pre-flight guidance).
  planner.productDocsDir:
    required: false
    default: docs/product/
    description: Directory where user stories / product briefs live (read by qa-engineer).
  data.brief:
    required: true
    description: >-
      Verbatim block dropped into the data-engineer agent: the project's data
      source(s) (endpoints, shapes, quirks), data-module layout, and guidance for
      the analytical insights the project derives. Markdown sections welcome.
  qa.pyramid:
    required: true
    description: Verbatim body of the qa-engineer "Test pyramid" section — the project's test tiers with tooling and mocking boundaries.
  qa.fixtures:
    required: true
    description: Verbatim body of the qa-engineer "Fixtures" section — where fixtures live and how they are captured.
  devops.ci:
    required: true
    description: Verbatim body of the devops-engineer "CI baseline" section — the ordered pipeline steps.
  devops.dependencies:
    required: true
    description: Verbatim body of the devops-engineer "Dependencies" section — package manager, update automation, and major-version policy.

name: code-quality
description: Code-quality specialists — TDD, security-audit, and codebase-architecture skills plus architect and security agents. Pairs with the obsidian-dev bundle (the architect agent references its obsidian-plugin-dev skill).
agents: [architect, security]
skills: [tdd, security-audit, codebase-architecture]
config:
  project.name:
    required: true
    description: Bare project name, e.g. "Synapse". Used in "the <name> plugin" phrasing.
  project.longName:
    required: true
    description: Full prose project descriptor, e.g. "the Synapse Obsidian plugin".
  tdd.priorityTiers:
    required: true
    description: Verbatim body of the TDD "Test Priority Tiers" section — the project's module/test-coverage map (tier tables plus the "Do NOT unit test" list).
  tdd.moduleBoundaries:
    required: true
    description: Verbatim text of the TDD architectural import-boundary rule naming the project's feature modules and any documented cross-module dependency exception.
  tdd.workflows:
    required: true
    description: Verbatim body of the "TDD Workflow for New Features" section — the project's feature-specific TDD recipes.
  arch.settingsType:
    required: true
    description: Name of the project's unified settings type, e.g. "SynapseSettings".
  arch.depExceptions:
    required: true
    description: Documented inter-module dependency exception(s) allowed by the architecture, e.g. "VideoModule → AudioModule (documented exception)".
  security.skillGitignore:
    required: true
    description: Sensitive paths the project must gitignore, formatted as an inline-code list, e.g. "`.env`, `data.json`, `.synapse/`".
  security.dataDir:
    required: true
    description: Project data/proposal directory that file paths must resolve within, formatted as inline code, e.g. "`.synapse/`".
  security.externalTools:
    required: true
    description: External processes the project shells out to, e.g. "yt-dlp, ffmpeg".
  security.mediaFetchTool:
    required: true
    description: Primary external tool that receives user-provided URLs, e.g. "yt-dlp".
  security.agentGitignore:
    required: true
    description: Plain (non-code-formatted) list of sensitive paths for the security agent's gitignore check, e.g. ".env, data.json, .synapse/, node_modules/".
  security.threatModel:
    required: true
    description: Verbatim bullet list of the project's real attack surface (external APIs, external processes, file access, secret storage).

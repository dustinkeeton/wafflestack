# Managed by wafflestack (github-workflow bundle) — do not edit by hand; re-render instead.
# Fails CI when a managed file drifts from .waffle.lock.json: either a rendered file
# was hand-edited, or the repo never committed its render + lock. See the bundle setup note.
name: waffle-doctor

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: doctor only reads the checked-out tree — no writes, no secrets.
permissions:
  contents: read

# Cancel superseded runs on the same pull request; always let main-branch checks finish.
concurrency:
  group: waffle-doctor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Check wafflestack drift
        run: npx --yes {{doctor.toolkitRef}} doctor {{doctor.flags}}
